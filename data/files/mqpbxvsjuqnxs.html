<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test T20 · Enfermedades Sistémicas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#eaeef0;--paper:#fff;--ink:#13232a;--ink-soft:#46585f;--teal:#0f4d57;--teal-deep:#0a3037;--amber:#cf8327;--amber-soft:#f6ecdc;--good:#1f7a4d;--good-bg:#e3f3ea;--bad:#b23a32;--bad-bg:#fbe7e4;--line:#d9e0e3;--shadow:0 10px 30px -16px rgba(10,48,55,.35);}
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;padding:18px 14px 60px}
  .wrap{max-width:760px;margin:0 auto}
  header.top{background:linear-gradient(135deg,var(--teal),var(--teal-deep));color:#eaf3f3;border-radius:18px;padding:22px 22px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  header.top::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#1c6b76,#0a3037 70%);box-shadow:inset 0 0 0 14px rgba(207,131,39,.25);opacity:.55}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#8fc3c7;font-weight:600;margin:0 0 6px}
  header.top h1{font-family:'Spectral',serif;font-weight:700;font-size:22px;line-height:1.15;margin:0 0 4px;position:relative;z-index:1}
  header.top p.sub{margin:0;font-size:13px;color:#bcd7d9;position:relative;z-index:1}
  .stats{display:flex;gap:10px;margin-top:16px;position:relative;z-index:1;flex-wrap:wrap}
  .stat{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:8px 12px;flex:1;min-width:84px}
  .stat .n{font-size:19px;font-weight:700;font-family:'Spectral',serif}.stat .l{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:#9fc8cb}
  .stat.good .n{color:#9ff0c2}.stat.bad .n{color:#ffb3ab}
  .progress{height:7px;background:rgba(255,255,255,.16);border-radius:99px;margin-top:14px;overflow:hidden;position:relative;z-index:1}
  .progress>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--amber),#e8a850);border-radius:99px;transition:width .35s}
  .card{background:var(--paper);border-radius:18px;box-shadow:var(--shadow);padding:22px 22px 20px;margin-top:18px;border:1px solid var(--line)}
  .qmeta{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .qnum{font-family:'Spectral',serif;font-weight:700;font-size:14px;color:var(--teal);background:var(--amber-soft);border:1px solid #ecdcc3;border-radius:8px;padding:3px 10px}
  .tag{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:var(--ink-soft);background:#eef2f3;border-radius:7px;padding:3px 9px}
  .tag.case{color:#8a4b12;background:#f6ecdc}.tag.ddx{color:#7a3a8f;background:#f1e6f4}
  .stem{font-family:'Spectral',serif;font-size:18px;line-height:1.4;margin:0 0 16px;font-weight:600}
  .stem .case-lead{display:block;font-weight:400;font-style:italic;color:var(--ink-soft);font-size:15px;margin-bottom:8px}
  .figure{margin:0 0 16px;background:#f5f8f8;border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
  .figure svg{max-width:100%;height:auto}.figcap{font-size:11.5px;color:var(--ink-soft);margin-top:6px;font-style:italic}
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{display:flex;gap:11px;align-items:flex-start;width:100%;background:#fbfcfc;border:1.5px solid var(--line);border-radius:12px;padding:12px 13px;cursor:pointer;font:inherit;font-size:14.5px;color:var(--ink);transition:.15s;text-align:left}
  .opt:hover:not(.locked){border-color:var(--teal);background:#f3f8f8}
  .opt .key{flex:none;width:24px;height:24px;border-radius:7px;background:#eef2f3;color:var(--ink-soft);font-weight:700;font-size:13px;display:grid;place-items:center;font-family:'Spectral',serif}
  .opt .txt{padding-top:1px}.opt.locked{cursor:default}
  .opt.correct{border-color:var(--good);background:var(--good-bg)}.opt.correct .key{background:var(--good);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--bad-bg)}.opt.wrong .key{background:var(--bad);color:#fff}
  .opt.dim{opacity:.6}
  .explain{margin-top:14px;border-left:4px solid var(--amber);background:var(--amber-soft);border-radius:0 12px 12px 0;padding:12px 14px;font-size:14px;display:none}
  .explain.show{display:block;animation:fade .3s}.explain b{color:var(--teal-deep)}
  .verdict{font-weight:700;font-family:'Spectral',serif;font-size:15px;margin-bottom:3px}.verdict.ok{color:var(--good)}.verdict.no{color:var(--bad)}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .nav{display:flex;gap:10px;margin-top:18px;align-items:center}
  .btn{font:inherit;font-weight:600;font-size:14px;border-radius:11px;padding:11px 18px;cursor:pointer;border:1.5px solid var(--teal);transition:.15s}
  .btn.ghost{background:#fff;color:var(--teal)}.btn.ghost:hover{background:#eef6f6}
  .btn.solid{background:var(--teal);color:#fff;margin-left:auto}.btn.solid:hover{background:var(--teal-deep)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .jumpwrap{margin-top:18px;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:16px 18px;box-shadow:var(--shadow)}
  .jumpwrap h3{margin:0 0 12px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
  .grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
  .cell{aspect-ratio:1;border:1.5px solid var(--line);border-radius:8px;background:#fbfcfc;font:inherit;font-size:12px;font-weight:600;color:var(--ink-soft);cursor:pointer;display:grid;place-items:center;transition:.12s}
  .cell:hover{border-color:var(--teal)}.cell.cur{border-color:var(--teal);box-shadow:0 0 0 2px rgba(15,77,87,.2)}
  .cell.ok{background:var(--good-bg);border-color:var(--good);color:var(--good)}.cell.no{background:var(--bad-bg);border-color:var(--bad);color:var(--bad)}
  .results{display:none;background:var(--paper);border-radius:18px;box-shadow:var(--shadow);padding:28px 24px;margin-top:18px;text-align:center;border:1px solid var(--line)}
  .results.show{display:block}
  .scoreBig{font-family:'Spectral',serif;font-size:58px;font-weight:700;color:var(--teal);line-height:1}.scoreBig small{font-size:24px;color:var(--ink-soft)}
  .grade{font-family:'Spectral',serif;font-size:22px;font-weight:600;margin-top:8px}.results p{color:var(--ink-soft);font-size:14.5px}
  @media(max-width:520px){.grid{grid-template-columns:repeat(8,1fr)}.stem{font-size:16.5px}header.top h1{font-size:19px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <p class="eyebrow">Oftalmología · 4º Medicina · T20</p>
    <h1>Enfermedades Sistémicas y el Ojo</h1>
    <p class="sub">80 preguntas · ≥20 casos clínicos · diagnóstico diferencial · respuesta razonada</p>
    <div class="stats">
      <div class="stat"><div class="n" id="sPos">1<span style="font-size:13px;color:#9fc8cb">/80</span></div><div class="l">Pregunta</div></div>
      <div class="stat good"><div class="n" id="sOk">0</div><div class="l">Aciertos</div></div>
      <div class="stat bad"><div class="n" id="sNo">0</div><div class="l">Fallos</div></div>
    </div>
    <div class="progress"><i id="bar"></i></div>
  </header>
  <main class="card" id="card">
    <div class="qmeta"><span class="qnum" id="qnum">01</span><span class="tag" id="qtag">Tema</span></div>
    <div id="figure"></div>
    <p class="stem" id="stem"></p>
    <div class="opts" id="opts"></div>
    <div class="explain" id="explain"></div>
    <div class="nav">
      <button class="btn ghost" id="prev">← Anterior</button>
      <button class="btn solid" id="next">Siguiente →</button>
    </div>
  </main>
  <section class="results" id="results">
    <div class="scoreBig"><span id="rOk">0</span><small>/80</small></div>
    <div class="grade" id="rGrade"></div>
    <p id="rMsg"></p>
    <button class="btn solid" style="margin:14px auto 0" id="restart">Repetir test</button>
  </section>
  <section class="jumpwrap"><h3>Navegación rápida</h3><div class="grid" id="grid"></div></section>
</div>

<script>
const figExo=`<svg viewBox="0 0 240 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Exoftalmos con retracción palpebral">
<path d="M30 75 Q90 40 150 75 Q90 110 30 75Z" fill="#fff" stroke="#7a8b90"/><circle cx="90" cy="75" r="26" fill="#9a6a3c"/><circle cx="90" cy="75" r="12" fill="#1a1a1a"/>
<path d="M30 75 Q90 38 150 75" fill="none" stroke="#b23a32" stroke-width="2"/>
<path d="M170 50 Q210 60 170 70" fill="none" stroke="#7a8b90" stroke-width="2"/><circle cx="195" cy="60" r="20" fill="#fff" stroke="#7a8b90"/><circle cx="195" cy="60" r="22" fill="none" stroke="#b23a32" stroke-width="2"/><circle cx="195" cy="60" r="9" fill="#1a1a1a"/>
<text x="120" y="135" text-anchor="middle" style="font:400 10px Inter;fill:#46585f">protrusión ocular + retracción palpebral (Graves)</text></svg>`;
const figEscleritis=`<svg viewBox="0 0 220 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ojo con inyección escleral violácea profunda">
<ellipse cx="110" cy="75" rx="100" ry="48" fill="#d98a92"/>
<g stroke="#8a2a55" stroke-width="2.4" fill="none" opacity=".8"><path d="M14 70 Q60 64 96 75"/><path d="M206 80 Q160 86 124 75"/><path d="M30 95 Q70 88 100 86"/></g>
<circle cx="110" cy="75" r="34" fill="#7a5a3a"/><circle cx="110" cy="75" r="15" fill="#1a1a1a"/>
<text x="110" y="138" text-anchor="middle" style="font:400 11px Inter;fill:#7a2a25">inyección profunda violácea (escleritis)</text></svg>`;
const figPizza=`<svg viewBox="0 0 220 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Retinitis con exudados y hemorragias (en pizza)">
<circle cx="110" cy="72" r="64" fill="#dd9a45" stroke="#b8752f"/>
<g fill="#f3ecd0"><circle cx="92" cy="62" r="13"/><circle cx="128" cy="84" r="11"/></g>
<g fill="#9c2b22"><path d="M120 58 l9 -3 -2 10z"/><path d="M86 92 l9 -3 -2 10z"/><path d="M132 60 l8 -2 -2 9z"/></g></svg>`;
const figOjoseco=`<svg viewBox="0 0 220 140" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tinción punteada corneal de ojo seco">
<ellipse cx="110" cy="70" rx="96" ry="46" fill="#cfe6dd"/><circle cx="110" cy="70" r="40" fill="#bcd9cf"/>
<g fill="#1f7a4d"><circle cx="96" cy="60" r="2.4"/><circle cx="116" cy="66" r="2.4"/><circle cx="104" cy="78" r="2.4"/><circle cx="124" cy="74" r="2.4"/><circle cx="90" cy="74" r="2"/></g>
<circle cx="110" cy="70" r="15" fill="#1a1a1a"/>
<text x="110" y="128" text-anchor="middle" style="font:400 11px Inter;fill:#1f5a40">tinción punteada (ojo seco)</text></svg>`;

const Q=[
{cat:"Concepto",c:1,q:"Conocer las manifestaciones oculares de las enfermedades sistémicas es útil para todo lo siguiente EXCEPTO:",
 o:["Diagnóstico inicial","Sustituir el estudio sistémico","Prevenir daño visual","Seguir el tratamiento"],
 e:"Sirven para el <b>diagnóstico inicial</b>, como ayuda diagnóstica, para <b>prevenir daño visual</b> y seguir el tratamiento; no sustituyen el estudio sistémico."},
{cat:"Tejido · DDx",c:0,ddx:true,q:"La vasculitis retiniana (riesgo visual alto) se asocia sobre todo a:",
 o:["LES, PAN, Wegener y Behçet","Solo a la diabetes","Solo a la AR","Solo al herpes"],
 e:"La <b>vasculitis retiniana</b> (riesgo alto) se asocia a <b>LES, PAN, Wegener y Behçet</b>."},
{cat:"Reumáticas",c:2,q:"La artritis reumatoide se asocia oftalmológicamente a:",
 o:["Vasculitis retiniana","Exoftalmos","Ojo seco, queratitis ulcerativa periférica y escleritis","Catarata congénita"],
 e:"La <b>AR</b> da <b>ojo seco</b> (Sjögren secundario), <b>queratitis ulcerativa periférica</b> y <b>escleritis</b> (nodular)."},
{cat:"Imagen · AR",c:3,figSrc:"figOjoseco",figcap:"Superficie ocular del paciente.",
 q:"Esta tinción punteada corneal en una paciente con artritis reumatoide corresponde a:",
 o:["Escleritis","Uveítis","Catarata","Queratitis por ojo seco (Sjögren secundario)"],
 e:"La tinción punteada por sequedad en una AR es la <b>queratitis por ojo seco</b> (Sjögren secundario)."},
{cat:"AIJ",c:0,q:"La uveítis de la artritis idiopática juvenil es:",
 o:["Anterior y poco sintomática (requiere cribado)","Posterior y muy dolorosa","Una panuveítis aguda","Una vasculitis"],
 e:"La <b>AIJ</b> da una <b>uveítis anterior poco sintomática</b>; por eso requiere cribado (riesgo de glaucoma, catarata, queratopatía en banda)."},
{cat:"Escleritis",c:1,q:"La escleritis se asocia a enfermedades sistémicas como:",
 o:["Diabetes","AR, Wegener, LES y PAN","Hipertensión","Miopía"],
 e:"La <b>escleritis</b> se asocia a <b>AR, Wegener (GPA), LES y PAN</b>."},
{cat:"Imagen · escleritis",c:2,figSrc:"figEscleritis",figcap:"Ojo del paciente.",
 q:"Esta inyección profunda de color violáceo, muy dolorosa, en un paciente con AR corresponde a:",
 o:["Conjuntivitis","Ojo seco","Escleritis","Catarata"],
 e:"La inyección <b>profunda violácea</b> y dolorosa (no blanquea con fenilefrina) es una <b>escleritis</b>."},
{cat:"Behçet",c:3,q:"La enfermedad de Behçet se asocia a:",
 o:["Solo ojo seco","Solo catarata","Exoftalmos","Vasculitis retiniana oclusiva + uveítis anterior con hipopión"],
 e:"El <b>Behçet</b> da <b>vasculitis retiniana oclusiva</b> y <b>uveítis anterior con hipopión</b>."},
{cat:"Tiroides",c:0,q:"La causa más frecuente de exoftalmos en el ADULTO es:",
 o:["La oftalmopatía tiroidea (Graves)","La celulitis orbitaria","Un tumor cerebral","Una catarata"],
 e:"La <b>oftalmopatía tiroidea</b> (Graves) es la causa más frecuente de exoftalmos en el adulto (uni o bilateral)."},
{cat:"Tiroides · DDx",c:1,ddx:true,q:"La causa más frecuente de exoftalmos en el NIÑO es:",
 o:["La oftalmopatía tiroidea","La celulitis orbitaria","El retinoblastoma","La catarata congénita"],
 e:"En el <b>niño</b>, la causa más frecuente de exoftalmos es la <b>celulitis orbitaria</b>."},
{cat:"Imagen · tiroides",c:2,figSrc:"figExo",figcap:"Aspecto del paciente.",
 q:"Esta protrusión ocular con retracción palpebral en una mujer de mediana edad sugiere:",
 o:["Conjuntivitis","Glaucoma","Oftalmopatía tiroidea (Graves)","Catarata"],
 e:"Exoftalmos + retracción palpebral en una mujer de mediana edad = <b>oftalmopatía tiroidea</b> (Graves)."},
{cat:"Tiroides",c:3,q:"La oftalmopatía tiroidea puede cursar con:",
 o:["Solo hipertiroidismo","Solo eutiroidismo","Solo hipotiroidismo","Hipo, eu o hipertiroidismo (la afectación ocular es independiente)"],
 e:"La <b>oftalmopatía tiroidea</b> puede darse con el paciente <b>hipo, eu o hipertiroideo</b>; la afectación ocular es autoinmune e independiente del estado hormonal."},
{cat:"Tiroides",c:0,q:"La oftalmopatía tiroidea puede amenazar la visión por:",
 o:["Neuropatía óptica compresiva","Conjuntivitis","Ojo seco leve","Presbicia"],
 e:"La complicación visual grave de la <b>oftalmopatía tiroidea</b> es la <b>neuropatía óptica compresiva</b> (también oftalmoplejía restrictiva con diplopía)."},
{cat:"Caso clínico · tiroides",c:1,case:true,
 lead:"Mujer de 45 años con enfermedad de Graves, ojos saltones, retracción palpebral, diplopía y limitación de la mirada; refiere empeoramiento de la visión de un ojo.",
 q:"¿Qué complicación grave hay que descartar y cómo se tratan los casos moderados/graves?",
 o:["Conjuntivitis; lágrimas","Catarata; cirugía","Neuropatía óptica compresiva; corticoides","Glaucoma agudo; iridotomía"],
 e:"Hay que descartar <b>neuropatía óptica compresiva</b>; los casos moderados/graves de oftalmopatía tiroidea se tratan con <b>corticoides</b>."},
{cat:"ACG",c:2,q:"La arteritis de células gigantes es:",
 o:["Una infección","Un tumor","Una vasculitis necrotizante de arterias grandes y medias en ancianos","Una catarata"],
 e:"La <b>ACG</b> es una <b>vasculitis necrotizante</b> de arterias grandes y medias, propia de <b>ancianos</b>."},
{cat:"ACG",c:3,q:"La manifestación oftalmológica más grave de la ACG es:",
 o:["Ojo seco","Conjuntivitis","Catarata","Neuropatía óptica isquémica (NOIA arterítica) y obstrucciones arteriales"],
 e:"La <b>ACG</b> produce <b>NOIA arterítica</b> y obstrucciones arteriales retinianas (también diplopía por afectación de pares)."},
{cat:"ACG",c:0,q:"El tratamiento de la arteritis de células gigantes es:",
 o:["Corticoides a dosis altas urgentes (± tocilizumab/metotrexato)","Observación","Antibióticos","AntiVEGF"],
 e:"La <b>ACG</b> requiere <b>corticoides a dosis altas urgentes</b> (± ahorradores como tocilizumab/metotrexato) para salvar la visión."},
{cat:"Caso clínico · ACG",c:1,case:true,
 lead:"Mujer de 78 años con cefalea, claudicación mandibular, VSG 90 mm/h y pérdida visual brusca de un ojo.",
 q:"Diagnóstico y actitud:",
 o:["NOIA no arterítica; observar","Arteritis de células gigantes (NOIA arterítica); corticoides urgentes","Glaucoma; hipotensores","Catarata; cirugía"],
 e:"Anciana + claudicación mandibular + VSG muy alta + pérdida visual = <b>ACG (NOIA arterítica)</b>; <b>corticoides urgentes</b>."},
{cat:"Sarcoidosis",c:2,q:"La sarcoidosis se asocia oftalmológicamente a:",
 o:["Solo catarata","Solo exoftalmos","Uveítis anterior, periflebitis 'en gota de cera' y uveítis intermedia con bolas de nieve","Solo ojo seco"],
 e:"La <b>sarcoidosis</b> da <b>uveítis anterior</b>, periflebitis con exudados <b>'en gota de cera'</b> y uveítis intermedia con <b>bolas de nieve</b>."},
{cat:"VIH",c:3,q:"La afectación ocular MÁS FRECUENTE en la fase SIDA es:",
 o:["La catarata","El glaucoma","La conjuntivitis","La microangiopatía retiniana"],
 e:"La <b>microangiopatía retiniana</b> es la afectación ocular más frecuente en la fase SIDA (la retinitis por CMV es la más temida)."},
{cat:"VIH",c:0,q:"La infección oportunista retiniana más característica del SIDA avanzado es:",
 o:["La retinitis por CMV","La toxoplasmosis cerebral","La candidiasis oral","La neumonía"],
 e:"La <b>retinitis por CMV</b> ('en pizza') es la infección retiniana característica del SIDA avanzado (CD4 bajos)."},
{cat:"Imagen · CMV",c:1,figSrc:"figPizza",figcap:"Fondo de ojo del paciente con VIH.",
 q:"Esta retinitis con exudados y hemorragias 'en pizza' en un inmunodeprimido corresponde a:",
 o:["Toxoplasmosis","Retinitis por CMV","Sarcoidosis","Behçet"],
 e:"La retinitis 'en pizza' en un inmunodeprimido (VIH) es la <b>retinitis por CMV</b>."},
{cat:"Sífilis",c:2,q:"La sífilis puede producir, a nivel pupilar:",
 o:["Midriasis fija","Síndrome de Horner","Pupila de Argyll-Robertson (disociación luz-acomodación)","Pupila de Adie"],
 e:"La <b>neurosífilis</b> produce la <b>pupila de Argyll-Robertson</b> (acomoda pero no reacciona a la luz)."},
{cat:"Herpes",c:3,q:"El herpes zóster oftálmico afecta a:",
 o:["El nervio facial","El nervio óptico","El simpático","La rama oftálmica del trigémino (especialmente la nasociliar)"],
 e:"El <b>herpes zóster oftálmico</b> afecta a la <b>rama oftálmica del trigémino</b> (la afectación nasociliar/signo de Hutchinson predice afectación ocular)."},
{cat:"DM",c:0,q:"Además de la retinopatía, la diabetes puede producir:",
 o:["Mala adherencia del epitelio corneal, ↓sensibilidad corneal, refracción inestable, catarata, glaucoma neovascular y paresias de pares","Solo retinopatía","Exoftalmos","Escleritis"],
 e:"La <b>diabetes</b> da, además de la retinopatía, <b>mala adherencia epitelial, ↓sensibilidad corneal, refracción inestable, catarata, glaucoma neovascular y paresias de pares craneales</b>."},
{cat:"DM",c:1,q:"La parálisis del III par de origen diabético (isquémico) típicamente:",
 o:["Dilata la pupila (midriasis)","Respeta la pupila","Causa exoftalmos","Produce escleritis"],
 e:"El <b>III par isquémico</b> (diabético) suele <b>respetar la pupila</b> (la regla de la pupila); la midriasis orienta a causa compresiva."},
{cat:"Caso clínico · DM",c:2,case:true,
 lead:"Diabético de 60 años que refiere que su graduación de gafas 'cambia' según los días y tiene la glucemia mal controlada.",

const stem=$("stem"),opts=$("opts"),explain=$("explain"),figure=$("figure"),qnum=$("qnum"),qtag=$("qtag"),bar=$("bar"),grid=$("grid");
function buildGrid(){grid.innerHTML="";Q.forEach((_,i)=>{const b=document.createElement("button");b.className="cell";b.textContent=i+1;b.onclick=()=>{cur=i;render();window.scrollTo({top:0,behavior:"smooth"});};grid.appendChild(b);});}
function refreshGrid(){[...grid.children].forEach((c,i)=>{c.classList.remove("cur","ok","no");if(i===cur)c.classList.add("cur");if(answers[i]!=null)c.classList.add(answers[i]===Q[i].c?"ok":"no");});}
function updateStats(){const ok=answers.filter((a,i)=>a===Q[i].c).length;const no=answers.filter((a,i)=>a!=null&&a!==Q[i].c).length;$("sOk").textContent=ok;$("sNo").textContent=no;$("sPos").innerHTML=(cur+1)+'<span style="font-size:13px;color:#9fc8cb">/80</span>';const done=answers.filter(a=>a!=null).length;bar.style.width=(done/Q.length*100)+"%";}
function render(){const q=Q[cur];qnum.textContent=String(cur+1).padStart(2,"0");qtag.textContent=q.cat;qtag.className="tag"+(q.case?" case":(q.ddx?" ddx":""));
  if(q.figSrc&&figMap[q.figSrc]){figure.innerHTML=`<div class="figure">${figMap[q.figSrc]}<div class="figcap">${q.figcap||""}</div></div>`;}else figure.innerHTML="";
  stem.innerHTML=(q.lead?`<span class="case-lead">${q.lead}</span>`:"")+q.q;
  const keys=["a","b","c","d"];opts.innerHTML="";const chosen=answers[cur];
  q.o.forEach((txt,i)=>{const b=document.createElement("button");b.className="opt";b.innerHTML=`<span class="key">${keys[i]}</span><span class="txt">${txt}</span>`;
    if(chosen!=null){b.classList.add("locked");if(i===q.c)b.classList.add("correct");else if(i===chosen)b.classList.add("wrong");else b.classList.add("dim");}else b.onclick=()=>choose(i);opts.appendChild(b);});
  if(chosen!=null){const ok=chosen===q.c;explain.className="explain show";explain.innerHTML=`<div class="verdict ${ok?'ok':'no'}">${ok?'✓ Correcto':'✗ Incorrecto · la respuesta es '+keys[q.c]+')'}</div>${q.e}`;}else{explain.className="explain";explain.innerHTML="";}
  $("prev").disabled=cur===0;$("next").textContent=cur===Q.length-1?"Ver resultados":"Siguiente →";updateStats();refreshGrid();}
function choose(i){if(answers[cur]!=null)return;answers[cur]=i;render();}
$("next").onclick=()=>{if(cur===Q.length-1)showResults();else{cur++;render();window.scrollTo({top:0,behavior:"smooth"});}};
$("prev").onclick=()=>{if(cur>0){cur--;render();window.scrollTo({top:0,behavior:"smooth"});}};
function showResults(){const ok=answers.filter((a,i)=>a===Q[i].c).length;const pct=Math.round(ok/Q.length*100);$("rOk").textContent=ok;let grade,msg;
  if(pct>=90){grade="Sobresaliente · ¡examen de 10!";msg="Dominas las asociaciones sistémicas. A por el examen.";}
  else if(pct>=70){grade="Notable";msg="Buen nivel. Repasa los fallos en rojo, sobre todo la tabla por tejido y la oftalmopatía tiroidea.";}
  else if(pct>=50){grade="Aprobado justo";msg="Base correcta; refuerza ACG, AR y las infecciosas.";}
  else{grade="A reforzar";msg="Vuelve sobre el resumen del T20 (OJO CUIDADO) y repite el test.";}
  $("rGrade").textContent=grade;$("rMsg").textContent=`${ok}/80 aciertos (${pct}%). ${msg}`;$("results").classList.add("show");$("results").scrollIntoView({behavior:"smooth"});}
$("restart").onclick=()=>{answers.fill(null);cur=0;$("results").classList.remove("show");render();window.scrollTo({top:0,behavior:"smooth"});};
buildGrid();render();
</script>
</body>
</html>
