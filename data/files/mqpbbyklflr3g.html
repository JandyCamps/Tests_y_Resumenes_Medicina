<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test T10 · Distrofias Heredodegenerativas y Tumores de la Úvea</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#eaeef0;--paper:#fff;--ink:#13232a;--ink-soft:#46585f;--teal:#0f4d57;--teal-deep:#0a3037;--amber:#cf8327;--amber-soft:#f6ecdc;--good:#1f7a4d;--good-bg:#e3f3ea;--bad:#b23a32;--bad-bg:#fbe7e4;--line:#d9e0e3;--shadow:0 10px 30px -16px rgba(10,48,55,.35);}
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;padding:18px 14px 60px}
  .wrap{max-width:760px;margin:0 auto}
  header.top{background:linear-gradient(135deg,var(--teal),var(--teal-deep));color:#eaf3f3;border-radius:18px;padding:22px 22px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  header.top::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#1c6b76,#0a3037 70%);box-shadow:inset 0 0 0 14px rgba(207,131,39,.25);opacity:.55}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#8fc3c7;font-weight:600;margin:0 0 6px}
  header.top h1{font-family:'Spectral',serif;font-weight:700;font-size:22px;line-height:1.15;margin:0 0 4px;position:relative;z-index:1}
  header.top p.sub{margin:0;font-size:13px;color:#bcd7d9;position:relative;z-index:1}
  .stats{display:flex;gap:10px;margin-top:16px;position:relative;z-index:1;flex-wrap:wrap}
  .stat{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:8px 12px;flex:1;min-width:84px}
  .stat .n{font-size:19px;font-weight:700;font-family:'Spectral',serif}.stat .l{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:#9fc8cb}
  .stat.good .n{color:#9ff0c2}.stat.bad .n{color:#ffb3ab}
  .progress{height:7px;background:rgba(255,255,255,.16);border-radius:99px;margin-top:14px;overflow:hidden;position:relative;z-index:1}
  .progress>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--amber),#e8a850);border-radius:99px;transition:width .35s}
  .card{background:var(--paper);border-radius:18px;box-shadow:var(--shadow);padding:22px 22px 20px;margin-top:18px;border:1px solid var(--line)}
  .qmeta{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .qnum{font-family:'Spectral',serif;font-weight:700;font-size:14px;color:var(--teal);background:var(--amber-soft);border:1px solid #ecdcc3;border-radius:8px;padding:3px 10px}
  .tag{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:var(--ink-soft);background:#eef2f3;border-radius:7px;padding:3px 9px}
  .tag.case{color:#8a4b12;background:#f6ecdc}.tag.ddx{color:#7a3a8f;background:#f1e6f4}
  .stem{font-family:'Spectral',serif;font-size:18px;line-height:1.4;margin:0 0 16px;font-weight:600}
  .stem .case-lead{display:block;font-weight:400;font-style:italic;color:var(--ink-soft);font-size:15px;margin-bottom:8px}
  .figure{margin:0 0 16px;background:#f5f8f8;border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
  .figure svg{max-width:100%;height:auto}.figcap{font-size:11.5px;color:var(--ink-soft);margin-top:6px;font-style:italic}
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{display:flex;gap:11px;align-items:flex-start;width:100%;background:#fbfcfc;border:1.5px solid var(--line);border-radius:12px;padding:12px 13px;cursor:pointer;font:inherit;font-size:14.5px;color:var(--ink);transition:.15s;text-align:left}
  .opt:hover:not(.locked){border-color:var(--teal);background:#f3f8f8}
  .opt .key{flex:none;width:24px;height:24px;border-radius:7px;background:#eef2f3;color:var(--ink-soft);font-weight:700;font-size:13px;display:grid;place-items:center;font-family:'Spectral',serif}
  .opt .txt{padding-top:1px}.opt.locked{cursor:default}
  .opt.correct{border-color:var(--good);background:var(--good-bg)}.opt.correct .key{background:var(--good);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--bad-bg)}.opt.wrong .key{background:var(--bad);color:#fff}
  .opt.dim{opacity:.6}
  .explain{margin-top:14px;border-left:4px solid var(--amber);background:var(--amber-soft);border-radius:0 12px 12px 0;padding:12px 14px;font-size:14px;display:none}
  .explain.show{display:block;animation:fade .3s}.explain b{color:var(--teal-deep)}
  .verdict{font-weight:700;font-family:'Spectral',serif;font-size:15px;margin-bottom:3px}.verdict.ok{color:var(--good)}.verdict.no{color:var(--bad)}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .nav{display:flex;gap:10px;margin-top:18px;align-items:center}
  .btn{font:inherit;font-weight:600;font-size:14px;border-radius:11px;padding:11px 18px;cursor:pointer;border:1.5px solid var(--teal);transition:.15s}
  .btn.ghost{background:#fff;color:var(--teal)}.btn.ghost:hover{background:#eef6f6}
  .btn.solid{background:var(--teal);color:#fff;margin-left:auto}.btn.solid:hover{background:var(--teal-deep)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .jumpwrap{margin-top:18px;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:16px 18px;box-shadow:var(--shadow)}
  .jumpwrap h3{margin:0 0 12px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
  .grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
  .cell{aspect-ratio:1;border:1.5px solid var(--line);border-radius:8px;background:#fbfcfc;font:inherit;font-size:12px;font-weight:600;color:var(--ink-soft);cursor:pointer;display:grid;place-items:center;transition:.12s}
  .cell:hover{border-color:var(--teal)}.cell.cur{border-color:var(--teal);box-shadow:0 0 0 2px rgba(15,77,87,.2)}
  .cell.ok{background:var(--good-bg);border-color:var(--good);color:var(--good)}.cell.no{background:var(--bad-bg);border-color:var(--bad);color:var(--bad)}
  .results{display:none;background:var(--paper);border-radius:18px;box-shadow:var(--shadow);padding:28px 24px;margin-top:18px;text-align:center;border:1px solid var(--line)}
  .results.show{display:block}
  .scoreBig{font-family:'Spectral',serif;font-size:58px;font-weight:700;color:var(--teal);line-height:1}.scoreBig small{font-size:24px;color:var(--ink-soft)}
  .grade{font-family:'Spectral',serif;font-size:22px;font-weight:600;margin-top:8px}.results p{color:var(--ink-soft);font-size:14.5px}
  @media(max-width:520px){.grid{grid-template-columns:repeat(8,1fr)}.stem{font-size:16.5px}header.top h1{font-size:19px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <p class="eyebrow">Oftalmología · 4º Medicina · T10</p>
    <h1>Distrofias Heredodegenerativas y Tumores de la Úvea</h1>
    <p class="sub">80 preguntas · ≥20 casos clínicos · diagnóstico diferencial · respuesta razonada</p>
    <div class="stats">
      <div class="stat"><div class="n" id="sPos">1<span style="font-size:13px;color:#9fc8cb">/80</span></div><div class="l">Pregunta</div></div>
      <div class="stat good"><div class="n" id="sOk">0</div><div class="l">Aciertos</div></div>
      <div class="stat bad"><div class="n" id="sNo">0</div><div class="l">Fallos</div></div>
    </div>
    <div class="progress"><i id="bar"></i></div>
  </header>
  <main class="card" id="card">
    <div class="qmeta"><span class="qnum" id="qnum">01</span><span class="tag" id="qtag">Tema</span></div>
    <div id="figure"></div>
    <p class="stem" id="stem"></p>
    <div class="opts" id="opts"></div>
    <div class="explain" id="explain"></div>
    <div class="nav">
      <button class="btn ghost" id="prev">← Anterior</button>
      <button class="btn solid" id="next">Siguiente →</button>
    </div>
  </main>
  <section class="results" id="results">
    <div class="scoreBig"><span id="rOk">0</span><small>/80</small></div>
    <div class="grade" id="rGrade"></div>
    <p id="rMsg"></p>
    <button class="btn solid" style="margin:14px auto 0" id="restart">Repetir test</button>
  </section>
  <section class="jumpwrap"><h3>Navegación rápida</h3><div class="grid" id="grid"></div></section>
</div>

<script>
const figRP=`<svg viewBox="0 0 220 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fondo con espículas óseas, papila pálida y vasos finos">
<circle cx="110" cy="90" r="82" fill="#dd9a45" stroke="#b8752f"/>
<circle cx="64" cy="78" r="13" fill="#efe6c8" stroke="#cdbf8a"/>
<g stroke="#c98a3a" stroke-width="1.4" fill="none"><path d="M64 78 Q110 92 180 110 M64 78 Q110 72 184 64"/></g>
<g fill="#3a2a1a"><path d="M150 62 l4 -6 4 6 -4 6z"/><path d="M165 100 l4 -6 4 6 -4 6z"/><path d="M130 130 l4 -6 4 6 -4 6z"/><path d="M90 132 l4 -6 4 6 -4 6z"/><path d="M170 130 l4 -6 4 6 -4 6z"/><path d="M110 56 l4 -6 4 6 -4 6z"/></g>
</svg>`;
const figStargardt=`<svg viewBox="0 0 220 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mácula con manchas amarillentas (flecks)">
<circle cx="110" cy="90" r="82" fill="#e0973f" stroke="#b8752f"/>
<circle cx="156" cy="74" r="13" fill="#e8a23a" stroke="#c98a3a"/>
<g fill="#f3e08a"><ellipse cx="100" cy="86" rx="6" ry="3"/><ellipse cx="116" cy="96" rx="6" ry="3" transform="rotate(40 116 96)"/><ellipse cx="92" cy="100" rx="6" ry="3" transform="rotate(-30 92 100)"/><ellipse cx="124" cy="80" rx="6" ry="3" transform="rotate(20 124 80)"/><ellipse cx="104" cy="110" rx="6" ry="3"/></g>
<circle cx="108" cy="94" r="14" fill="#caa24e" opacity=".5"/>
</svg>`;
const figBest=`<svg viewBox="0 0 220 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lesión macular redondeada amarillenta en yema de huevo">
<circle cx="110" cy="90" r="82" fill="#e0973f" stroke="#b8752f"/>
<circle cx="156" cy="74" r="13" fill="#e8a23a" stroke="#c98a3a"/>
<circle cx="104" cy="92" r="26" fill="#f2d24a" stroke="#caa24e" stroke-width="2"/>
</svg>`;
const figMancha=`<svg viewBox="0 0 220 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Retina pálida con mancha roja central">
<circle cx="110" cy="90" r="82" fill="#f0e3d0" stroke="#cfc1a8"/>
<circle cx="110" cy="90" r="16" fill="#c0392b"/>
<circle cx="60" cy="76" r="12" fill="#e8c98a" stroke="#caa24e"/>
</svg>`;

const Q=[
{cat:"Electrofisiología",c:1,q:"El electrooculograma (EOG) estudia:",
 o:["El potencial de acción de los conos","El potencial de REPOSO (valora EPR y fotorreceptores)","La corteza visual","La presión intraocular"],
 e:"El <b>EOG</b> mide el <b>potencial de reposo</b>; valora el <b>EPR</b> y los fotorreceptores mediante el <b>índice de Arden</b>."},
{cat:"Electrofisiología",c:0,q:"El índice de Arden del EOG se considera patológico cuando es:",
 o:["< 1,6","> 1,8","= 2,0","Indiferente"],
 e:"Índice de Arden: <b>normal &gt;1,8</b>, dudoso 1,6–1,8 y <b>patológico &lt;1,6</b> (típicamente alterado en la enfermedad de Best)."},
{cat:"Electrofisiología",c:2,q:"El electrorretinograma (ERG) registra:",
 o:["El potencial de reposo","La respuesta cortical","El potencial de ACCIÓN (ondas a y b)","La PIO"],
 e:"El <b>ERG</b> mide el <b>potencial de acción</b> (ondas a y b) de la retina en condiciones fotópica y escotópica."},
{cat:"Electrofisiología",c:3,q:"En el ERG, las condiciones fotópica y escotópica valoran, respectivamente:",
 o:["Bastones y conos","EPR y coroides","Corteza y vía óptica","Conos (fotópica) y bastones (escotópica)"],
 e:"<b>Fotópica = conos</b>; <b>escotópica = bastones</b>. Es clave para interpretar las distrofias."},
{cat:"Electrofisiología",c:0,q:"Los potenciales evocados visuales (PEV) valoran:",
 o:["La corteza visual y la vía óptica","El EPR","La coroides","El cristalino"],
 e:"Los <b>PEV</b> registran la respuesta de la <b>corteza visual</b> y exploran la vía óptica."},
{cat:"Electrofisiología · DDx",c:1,ddx:true,q:"¿Qué variante del ERG valora la función macular?",
 o:["ERG patrón","ERG multifocal","EOG","PEV"],
 e:"El <b>ERG multifocal</b> valora la función <b>macular</b>; el ERG patrón valora la retina interna (células ganglionares)."},
{cat:"Distrofias",c:2,q:"Las distrofias retinianas son, en general:",
 o:["Adquiridas e unilaterales","Infecciosas","Defectos funcionales hereditarios, bilaterales y progresivos","Tumorales"],
 e:"Son <b>defectos funcionales hereditarios, bilaterales y progresivos</b>; predomina la herencia <b>autosómica recesiva (70%)</b>."},
{cat:"Retinosis pigmentaria",c:3,q:"La retinosis pigmentaria afecta primero a:",
 o:["Los conos","El EPR macular","La coroides","Los bastones (luego los conos)"],
 e:"La <b>RP</b> degenera primero los <b>bastones</b> (visión nocturna y periférica) y después los conos."},
{cat:"Retinosis pigmentaria",c:0,q:"El síntoma inicial más característico de la retinosis pigmentaria es:",
 o:["Nictalopía (ceguera nocturna) con reducción concéntrica del campo","Fotofobia","Pérdida de visión central","Diplopía"],
 e:"La <b>nictalopía</b> (mala visión nocturna) con <b>reducción concéntrica del campo</b> ('cañón de escopeta') es el inicio típico de la RP."},
{cat:"Caso clínico · RP",c:1,case:true,
 lead:"Varón de 25 años que en los últimos meses nota mala visión nocturna, dificultad al bajar escaleras y tropieza con los bordillos, pero puede leer y ver la televisión.",
 q:"¿Con qué entidad se relaciona?",
 o:["Enfermedad de Stargardt","Retinosis pigmentaria","Enfermedad de Best","Desprendimiento de retina"],
 e:"Nictalopía + pérdida de campo periférico con visión central conservada = <b>retinosis pigmentaria</b> (degeneración de bastones)."},
{cat:"Imagen · RP",c:2,figSrc:"figRP",figcap:"Fondo de ojo del paciente.",
 q:"Estas espículas óseas con papila pálida y vasos finos corresponden a:",
 o:["Stargardt","Distrofia de conos","Retinosis pigmentaria","Melanoma de coroides"],
 e:"La tríada <b>espículas óseas + palidez papilar + atenuación vascular</b> es típica de la <b>retinosis pigmentaria</b>."},
{cat:"Retinosis pigmentaria",c:3,q:"La tríada oftalmoscópica de la retinosis pigmentaria es:",
 o:["Drusas, atrofia y hemorragia","Flecks, silencio coroideo y bronce golpeado","Mancha rojo cereza, blanqueamiento y émbolo","Espículas óseas, palidez papilar y atenuación vascular"],
 e:"La tríada de la <b>RP</b>: <b>espículas óseas de pigmento + palidez papilar (cérea) + atenuación vascular</b>."},
{cat:"Retinosis pigmentaria",c:0,q:"En la retinosis pigmentaria, el ERG muestra inicialmente:",
 o:["ERG escotópico disminuido (bastones)","ERG fotópico aumentado","EOG normal con ERG plano","PEV abolido"],
 e:"Al afectar primero a los <b>bastones</b>, el <b>ERG escotópico</b> está disminuido de forma precoz; el fotópico cae en fases avanzadas."},
{cat:"Retinosis pigmentaria · tto",c:1,q:"¿Qué tratamiento emergente existe para algunas formas de retinosis pigmentaria?",
 o:["AntiVEGF","Terapia génica","Panfotocoagulación","Corticoides"],
 e:"La <b>terapia génica</b> (en genes concretos, p. ej. RPE65) es el tratamiento emergente de la RP; es la única distrofia con esta opción."},
{cat:"Retinosis pigmentaria · síndromes",c:2,q:"El síndrome de Usher asocia retinosis pigmentaria con:",
 o:["Sordera","Diabetes","Polidactilia","Cataratas congénitas"],
 e:"El <b>síndrome de Usher</b> asocia RP + <b>sordera neurosensorial</b>; el Bardet-Biedl asocia RP con obesidad, polidactilia, etc."},
{cat:"Stargardt",c:3,q:"La enfermedad de Stargardt es:",
 o:["La distrofia de bastones más frecuente","Un tumor coroideo","Una oclusión vascular","La distrofia MACULAR más frecuente (gen ABCA4, AR)"],
 e:"La <b>enfermedad de Stargardt</b> es la <b>distrofia macular más frecuente</b>; gen <b>ABCA4</b>, herencia <b>autosómica recesiva</b>."},
{cat:"Stargardt",c:0,q:"La clínica típica de la enfermedad de Stargardt es:",
 o:["Pérdida de visión CENTRAL con ↓AV antes de los 20 años","Nictalopía","Fotofobia con buena visión central","Pérdida del campo periférico"],
 e:"La <b>Stargardt</b> produce pérdida de <b>visión central</b> con ↓AV en pacientes <b>jóvenes (&lt;20 años)</b>."},
{cat:"Stargardt",c:1,q:"El hallazgo angiográfico (AFG) característico de la enfermedad de Stargardt es:",
 o:["Humo de chimenea","SILENCIO COROIDEO","Wash-out","Mancha rojo cereza"],
 e:"El <b>silencio coroideo</b> (la lipofuscina del EPR bloquea la fluorescencia coroidea) es muy característico de la <b>Stargardt</b>."},
{cat:"Imagen · Stargardt",c:2,figSrc:"figStargardt",figcap:"Fondo de ojo del paciente joven.",
 q:"Estas manchas amarillentas (flecks) en la mácula de un joven con pérdida de visión central sugieren:",
 o:["Retinosis pigmentaria","Best","Enfermedad de Stargardt","Hemangioma coroideo"],
 e:"<b>Flecks</b> maculares amarillentos + aspecto en 'bronce golpeado' + pérdida central en joven = <b>Stargardt</b>."},
{cat:"Stargardt",c:3,q:"En la enfermedad de Stargardt, el ERG muestra típicamente:",
 o:["Escotópico y fotópico abolidos","EOG alterado con ERG plano","Escotópico disminuido aislado","Escotópico normal y fotópico disminuido"],
 e:"En la <b>Stargardt</b> (distrofia macular/conos centrales), el <b>ERG escotópico es normal</b> y el <b>fotópico está disminuido</b>."},
{cat:"Best",c:0,q:"La enfermedad de Best (viteliforme) se hereda de forma:",
 o:["Autosómica dominante (gen BEST1)","Autosómica recesiva","Ligada al X","Mitocondrial"],
 e:"La <b>enfermedad de Best</b> es <b>autosómica dominante</b> (gen <b>BEST1</b>), con expresividad variable."},
{cat:"Best",c:1,q:"La clave diagnóstica electrofisiológica de la enfermedad de Best es:",
 o:["ERG fotópico alterado con EOG normal","EOG ALTERADO (Arden <1,6) con ERG NORMAL","PEV abolido","ERG escotópico plano"],
 e:"La <b>enfermedad de Best</b> presenta <b>EOG alterado (Arden &lt;1,6) con ERG normal</b>: el EOG es la prueba que 'canta'."},
{cat:"Imagen · Best",c:2,figSrc:"figBest",figcap:"Fondo de ojo del paciente.",
 q:"Esta lesión macular redondeada amarillenta 'en yema de huevo' es típica de:",
 o:["Stargardt","Distrofia de conos","Enfermedad de Best (material viteliforme)","Melanoma"],
 e:"El <b>material viteliforme ('yema de huevo')</b> en la mácula es característico de la <b>enfermedad de Best</b>."},
{cat:"Best",c:3,q:"El pronóstico de la enfermedad de Best es:",
 o:["Muy malo, ceguera precoz","Igual que la distrofia de conos","Letal","Bueno (asintomática al inicio, pérdida central en la 5ª década)"],
 e:"La <b>enfermedad de Best</b> tiene <b>buen pronóstico</b>: asintomática al inicio, con pérdida de visión central tardía (5ª década)."},
{cat:"Distrofia de conos",c:0,q:"La distrofia de conos cursa con:",
 o:["Fotofobia, discromatopsia, pérdida de visión central y escotoma central","Nictalopía y pérdida de campo periférico","Material viteliforme","Espículas óseas"],
 e:"La <b>distrofia de conos</b> da <b>fotofobia, alteración de los colores, pérdida de visión central y escotoma central</b>."},
{cat:"Distrofia de conos",c:1,q:"En la distrofia de conos, el ERG muestra:",
 o:["Escotópico abolido aislado","ERG fotópico alterado (escotópico normal o disminuido)","EOG alterado con ERG normal","PEV abolido"],
 e:"Al degenerar los <b>conos</b>, el <b>ERG fotópico está alterado</b> y el escotópico es normal o algo disminuido."},
{cat:"Distrofia de conos",c:2,q:"La imagen en 'ojo de buey' puede verse en:",
 o:["Retinosis pigmentaria","Hemangioma coroideo","Distrofia de conos (y en la maculopatía por antipalúdicos)","Enfermedad de Best"],

const $=id=>document.getElementById(id);
const stem=$("stem"),opts=$("opts"),explain=$("explain"),figure=$("figure"),qnum=$("qnum"),qtag=$("qtag"),bar=$("bar"),grid=$("grid");
function buildGrid(){grid.innerHTML="";Q.forEach((_,i)=>{const b=document.createElement("button");b.className="cell";b.textContent=i+1;b.onclick=()=>{cur=i;render();window.scrollTo({top:0,behavior:"smooth"});};grid.appendChild(b);});}
function refreshGrid(){[...grid.children].forEach((c,i)=>{c.classList.remove("cur","ok","no");if(i===cur)c.classList.add("cur");if(answers[i]!=null)c.classList.add(answers[i]===Q[i].c?"ok":"no");});}
function updateStats(){const ok=answers.filter((a,i)=>a===Q[i].c).length;const no=answers.filter((a,i)=>a!=null&&a!==Q[i].c).length;$("sOk").textContent=ok;$("sNo").textContent=no;$("sPos").innerHTML=(cur+1)+'<span style="font-size:13px;color:#9fc8cb">/80</span>';const done=answers.filter(a=>a!=null).length;bar.style.width=(done/Q.length*100)+"%";}
function render(){const q=Q[cur];qnum.textContent=String(cur+1).padStart(2,"0");qtag.textContent=q.cat;qtag.className="tag"+(q.case?" case":(q.ddx?" ddx":""));
  if(q.figSrc&&figMap[q.figSrc]){figure.innerHTML=`<div class="figure">${figMap[q.figSrc]}<div class="figcap">${q.figcap||""}</div></div>`;}else figure.innerHTML="";
  stem.innerHTML=(q.lead?`<span class="case-lead">${q.lead}</span>`:"")+q.q;
  const keys=["a","b","c","d"];opts.innerHTML="";const chosen=answers[cur];
  q.o.forEach((txt,i)=>{const b=document.createElement("button");b.className="opt";b.innerHTML=`<span class="key">${keys[i]}</span><span class="txt">${txt}</span>`;
    if(chosen!=null){b.classList.add("locked");if(i===q.c)b.classList.add("correct");else if(i===chosen)b.classList.add("wrong");else b.classList.add("dim");}else b.onclick=()=>choose(i);opts.appendChild(b);});
  if(chosen!=null){const ok=chosen===q.c;explain.className="explain show";explain.innerHTML=`<div class="verdict ${ok?'ok':'no'}">${ok?'✓ Correcto':'✗ Incorrecto · la respuesta es '+keys[q.c]+')'}</div>${q.e}`;}else{explain.className="explain";explain.innerHTML="";}

function choose(i){if(answers[cur]!=null)return;answers[cur]=i;render();}

$("prev").onclick=()=>{if(cur>0){cur--;render();window.scrollTo({top:0,behavior:"smooth"});}};
function showResults(){const ok=answers.filter((a,i)=>a===Q[i].c).length;const pct=Math.round(ok/Q.length*100);$("rOk").textContent=ok;let grade,msg;
  if(pct>=90){grade="Sobresaliente · ¡examen de 10!";msg="Dominas las distrofias y los tumores uveales. A por el examen.";}
  else if(pct>=70){grade="Notable";msg="Buen nivel. Repasa los fallos en rojo, sobre todo EOG/ERG y las 4 distrofias.";}
  else if(pct>=50){grade="Aprobado justo";msg="Base correcta; refuerza Best vs Stargardt y los tumores de coroides.";}
  else{grade="A reforzar";msg="Vuelve sobre el resumen del T10 (OJO CUIDADO) y repite el test.";}
  $("rGrade").textContent=grade;$("rMsg").textContent=`${ok}/80 aciertos (${pct}%). ${msg}`;$("results").classList.add("show");$("results").scrollIntoView({behavior:"smooth"});}
$("restart").onclick=()=>{answers.fill(null);cur=0;$("results").classList.remove("show");render();window.scrollTo({top:0,behavior:"smooth"});};
buildGrid();render();
</script>
</body>
