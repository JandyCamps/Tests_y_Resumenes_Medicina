<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test T23 · Patología Orbitaria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#eaeef0;--paper:#fff;--ink:#13232a;--ink-soft:#46585f;--teal:#0f4d57;--teal-deep:#0a3037;--amber:#cf8327;--amber-soft:#f6ecdc;--good:#1f7a4d;--good-bg:#e3f3ea;--bad:#b23a32;--bad-bg:#fbe7e4;--line:#d9e0e3;--shadow:0 10px 30px -16px rgba(10,48,55,.35);}
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;padding:18px 14px 60px}
  .wrap{max-width:760px;margin:0 auto}
  header.top{background:linear-gradient(135deg,var(--teal),var(--teal-deep));color:#eaf3f3;border-radius:18px;padding:22px 22px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  header.top::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#1c6b76,#0a3037 70%);box-shadow:inset 0 0 0 14px rgba(207,131,39,.25);opacity:.55}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#8fc3c7;font-weight:600;margin:0 0 6px}
  header.top h1{font-family:'Spectral',serif;font-weight:700;font-size:23px;line-height:1.15;margin:0 0 4px;position:relative;z-index:1}
  header.top p.sub{margin:0;font-size:13px;color:#bcd7d9;position:relative;z-index:1}
  .stats{display:flex;gap:10px;margin-top:16px;position:relative;z-index:1;flex-wrap:wrap}
  .stat{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:8px 12px;flex:1;min-width:84px}
  .stat .n{font-size:19px;font-weight:700;font-family:'Spectral',serif}.stat .l{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:#9fc8cb}
  .stat.good .n{color:#9ff0c2}.stat.bad .n{color:#ffb3ab}
  .progress{height:7px;background:rgba(255,255,255,.16);border-radius:99px;margin-top:14px;overflow:hidden;position:relative;z-index:1}
  .progress>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--amber),#e8a850);border-radius:99px;transition:width .35s}
  .card{background:var(--paper);border-radius:18px;box-shadow:var(--shadow);padding:22px 22px 20px;margin-top:18px;border:1px solid var(--line)}
  .qmeta{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .qnum{font-family:'Spectral',serif;font-weight:700;font-size:14px;color:var(--teal);background:var(--amber-soft);border:1px solid #ecdcc3;border-radius:8px;padding:3px 10px}
  .tag{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:var(--ink-soft);background:#eef2f3;border-radius:7px;padding:3px 9px}
  .tag.case{color:#8a4b12;background:#f6ecdc}.tag.ddx{color:#7a3a8f;background:#f1e6f4}
  .stem{font-family:'Spectral',serif;font-size:18px;line-height:1.4;margin:0 0 16px;font-weight:600}
  .stem .case-lead{display:block;font-weight:400;font-style:italic;color:var(--ink-soft);font-size:15px;margin-bottom:8px}
  .figure{margin:0 0 16px;background:#f5f8f8;border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
  .figure svg{max-width:100%;height:auto}.figcap{font-size:11.5px;color:var(--ink-soft);margin-top:6px;font-style:italic}
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{display:flex;gap:11px;align-items:flex-start;width:100%;background:#fbfcfc;border:1.5px solid var(--line);border-radius:12px;padding:12px 13px;cursor:pointer;font:inherit;font-size:14.5px;color:var(--ink);transition:.15s;text-align:left}
  .opt:hover:not(.locked){border-color:var(--teal);background:#f3f8f8}
  .opt .key{flex:none;width:24px;height:24px;border-radius:7px;background:#eef2f3;color:var(--ink-soft);font-weight:700;font-size:13px;display:grid;place-items:center;font-family:'Spectral',serif}
  .opt .txt{padding-top:1px}.opt.locked{cursor:default}
  .opt.correct{border-color:var(--good);background:var(--good-bg)}.opt.correct .key{background:var(--good);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--bad-bg)}.opt.wrong .key{background:var(--bad);color:#fff}
  .opt.dim{opacity:.6}
  .explain{margin-top:14px;border-left:4px solid var(--amber);background:var(--amber-soft);border-radius:0 12px 12px 0;padding:12px 14px;font-size:14px;display:none}
  .explain.show{display:block;animation:fade .3s}.explain b{color:var(--teal-deep)}
  .verdict{font-weight:700;font-family:'Spectral',serif;font-size:15px;margin-bottom:3px}.verdict.ok{color:var(--good)}.verdict.no{color:var(--bad)}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .nav{display:flex;gap:10px;margin-top:18px;align-items:center}
  .btn{font:inherit;font-weight:600;font-size:14px;border-radius:11px;padding:11px 18px;cursor:pointer;border:1.5px solid var(--teal);transition:.15s}
  .btn.ghost{background:#fff;color:var(--teal)}.btn.ghost:hover{background:#eef6f6}
  .btn.solid{background:var(--teal);color:#fff;margin-left:auto}.btn.solid:hover{background:var(--teal-deep)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .jumpwrap{margin-top:18px;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:16px 18px;box-shadow:var(--shadow)}
  .jumpwrap h3{margin:0 0 12px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
  .grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
  .cell{aspect-ratio:1;border:1.5px solid var(--line);border-radius:8px;background:#fbfcfc;font:inherit;font-size:12px;font-weight:600;color:var(--ink-soft);cursor:pointer;display:grid;place-items:center;transition:.12s}
  .cell:hover{border-color:var(--teal)}.cell.cur{border-color:var(--teal);box-shadow:0 0 0 2px rgba(15,77,87,.2)}
  .cell.ok{background:var(--good-bg);border-color:var(--good);color:var(--good)}.cell.no{background:var(--bad-bg);border-color:var(--bad);color:var(--bad)}
  .results{display:none;background:var(--paper);border-radius:18px;box-shadow:var(--shadow);padding:28px 24px;margin-top:18px;text-align:center;border:1px solid var(--line)}
  .results.show{display:block}
  .scoreBig{font-family:'Spectral',serif;font-size:58px;font-weight:700;color:var(--teal);line-height:1}.scoreBig small{font-size:24px;color:var(--ink-soft)}
  .grade{font-family:'Spectral',serif;font-size:22px;font-weight:600;margin-top:8px}.results p{color:var(--ink-soft);font-size:14.5px}
  @media(max-width:520px){.grid{grid-template-columns:repeat(8,1fr)}.stem{font-size:16.5px}header.top h1{font-size:20px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <p class="eyebrow">Oftalmología · 4º Medicina · T23</p>
    <h1>Patología Orbitaria</h1>
    <p class="sub">80 preguntas · ≥20 casos clínicos · diagnóstico diferencial · respuesta razonada</p>
    <div class="stats">
      <div class="stat"><div class="n" id="sPos">1<span style="font-size:13px;color:#9fc8cb">/80</span></div><div class="l">Pregunta</div></div>
      <div class="stat good"><div class="n" id="sOk">0</div><div class="l">Aciertos</div></div>
      <div class="stat bad"><div class="n" id="sNo">0</div><div class="l">Fallos</div></div>
    </div>
    <div class="progress"><i id="bar"></i></div>
  </header>
  <main class="card" id="card">
    <div class="qmeta"><span class="qnum" id="qnum">01</span><span class="tag" id="qtag">Tema</span></div>
    <div id="figure"></div>
    <p class="stem" id="stem"></p>
    <div class="opts" id="opts"></div>
    <div class="explain" id="explain"></div>
    <div class="nav">
      <button class="btn ghost" id="prev">← Anterior</button>
      <button class="btn solid" id="next">Siguiente →</button>
    </div>
  </main>
  <section class="results" id="results">
    <div class="scoreBig"><span id="rOk">0</span><small>/80</small></div>
    <div class="grade" id="rGrade"></div>
    <p id="rMsg"></p>
    <button class="btn solid" style="margin:14px auto 0" id="restart">Repetir test</button>
  </section>
  <section class="jumpwrap"><h3>Navegación rápida</h3><div class="grid" id="grid"></div></section>
</div>

<script>
const figPreOrb=`<svg viewBox="0 0 320 130" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Celulitis preseptal frente a orbitaria">
<text x="78" y="15" text-anchor="middle" style="font:600 10px Spectral,serif;fill:#1a5e86">preseptal</text>
<rect x="36" y="38" width="84" height="62" rx="9" fill="#eef3f5" stroke="#7fa6b5"/><circle cx="78" cy="72" r="17" fill="#9a6a3c"/><circle cx="78" cy="72" r="8" fill="#1a1a1a"/><rect x="36" y="32" width="84" height="11" rx="5" fill="#d65a4a"/>
<text x="242" y="15" text-anchor="middle" style="font:600 10px Spectral,serif;fill:#b23a32">orbitaria</text>
<rect x="200" y="38" width="84" height="62" rx="9" fill="#f6dcd6" stroke="#c77"/><circle cx="246" cy="72" r="20" fill="#9a6a3c"/><circle cx="246" cy="72" r="9" fill="#1a1a1a"/><path d="M222 100 q24 12 48 0" stroke="#b23a32" stroke-width="3" fill="none"/></svg>`;
const figTiroidea=`<svg viewBox="0 0 240 140" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Exoftalmos con retracción palpebral (tiroidea)">
<path d="M30 70 Q90 38 150 70 Q90 102 30 70Z" fill="#fff" stroke="#7a8b90"/><circle cx="90" cy="70" r="26" fill="#9a6a3c"/><circle cx="90" cy="70" r="12" fill="#1a1a1a"/>
<path d="M30 70 Q90 36 150 70" fill="none" stroke="#b23a32" stroke-width="2"/>
<text x="120" y="128" text-anchor="middle" style="font:400 10px Inter;fill:#46585f">proptosis + retracción palpebral (esclera visible)</text></svg>`;
const figPulsatil=`<svg viewBox="0 0 220 140" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ojo congestivo en cabeza de medusa (fístula carótido-cavernosa)">
<ellipse cx="110" cy="68" rx="96" ry="44" fill="#f3a89c"/>
<g stroke="#b23a32" stroke-width="2.2" fill="none"><path d="M14 60 Q60 56 96 68"/><path d="M206 76 Q160 80 124 68"/><path d="M30 86 Q70 80 100 80"/><path d="M30 50 Q70 56 100 58"/></g>
<circle cx="110" cy="68" r="30" fill="#7a5a3a"/><circle cx="110" cy="68" r="13" fill="#1a1a1a"/>
<text x="110" y="130" text-anchor="middle" style="font:400 10px Inter;fill:#7a2a25">ojo congestivo 'en cabeza de medusa'</text></svg>`;
const figTAC=`<svg viewBox="0 0 220 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TAC de órbitas con músculos engrosados">
<rect x="10" y="20" width="200" height="120" rx="10" fill="#1a1a1a"/>
<ellipse cx="70" cy="80" rx="30" ry="34" fill="none" stroke="#cfcfcf" stroke-width="2"/><ellipse cx="150" cy="80" rx="30" ry="34" fill="none" stroke="#cfcfcf" stroke-width="2"/>
<circle cx="70" cy="80" r="12" fill="#888"/><circle cx="150" cy="80" r="12" fill="#888"/>
<rect x="46" y="64" width="6" height="30" rx="3" fill="#dcdcdc"/><rect x="88" y="64" width="6" height="30" rx="3" fill="#dcdcdc"/>
<rect x="126" y="64" width="6" height="30" rx="3" fill="#dcdcdc"/><rect x="168" y="64" width="6" height="30" rx="3" fill="#dcdcdc"/>
<text x="110" y="134" text-anchor="middle" style="font:400 9px Inter;fill:#cfcfcf">músculos extraoculares engrosados</text></svg>`;

const Q=[
{cat:"Síndrome orbitario",c:1,q:"El signo cardinal de la patología orbitaria, por ser la órbita un espacio cerrado, es:",
 o:["La catarata","El exoftalmos (proptosis)","El glaucoma agudo","La leucocoria"],
 e:"Al ser la órbita un <b>espacio óseo cerrado</b>, todo aumento de volumen empuja el globo: <b>exoftalmos/proptosis</b>."},
{cat:"Exoftalmos · adulto",c:2,q:"La causa MÁS FRECUENTE de exoftalmos en el ADULTO es:",
 o:["La celulitis orbitaria","El pseudotumor","La orbitopatía tiroidea","Un tumor"],
 e:"La <b>orbitopatía tiroidea</b> es la causa más frecuente de exoftalmos en el adulto (uni y bilateral)."},
{cat:"Exoftalmos · niño",c:3,q:"La causa MÁS FRECUENTE de exoftalmos en el NIÑO es:",
 o:["La orbitopatía tiroidea","El pseudotumor","Un hemangioma","La celulitis orbitaria"],
 e:"En el <b>niño</b>, la causa más frecuente de exoftalmos es la <b>celulitis orbitaria</b>."},
{cat:"Celulitis · DDx",c:0,ddx:true,q:"La celulitis preseptal se localiza:",
 o:["Anterior al septum orbitario","Posterior al septum","En la retina","En el cristalino"],
 e:"La <b>celulitis preseptal</b> es <b>anterior al septum</b>; la orbitaria, posterior."},
{cat:"Celulitis · DDx",c:1,ddx:true,q:"¿Qué dato diferencia la celulitis ORBITARIA de la preseptal?",
 o:["El picor","Alteración de la AV y de la motilidad, exoftalmos no reductible y afectación general","El lagrimeo","La edad"],
 e:"La <b>celulitis orbitaria</b> tiene <b>↓AV, alteración de la MOE, exoftalmos no reductible y afectación general</b>; la preseptal no."},
{cat:"Imagen · celulitis",c:3,figSrc:"figPreOrb",figcap:"Dos pacientes con inflamación periorbitaria.",
 q:"El ojo de la derecha presenta proptosis y limitación de la motilidad; el de la izquierda solo inflamación anterior. Son, respectivamente:",
 o:["Orbitaria y preseptal","Ambas preseptal","Ambas orbitaria","Preseptal y orbitaria"],
 e:"Izquierda (solo inflamación anterior) = <b>preseptal</b>; derecha (proptosis + limitación) = <b>orbitaria</b>."},
{cat:"Celulitis orbitaria",c:2,q:"El foco que con más frecuencia origina una celulitis orbitaria es:",
 o:["Un orzuelo","Una conjuntivitis","Los senos paranasales (sobre todo el etmoidal)","Una catarata"],
 e:"La <b>celulitis orbitaria</b> procede sobre todo de los <b>senos paranasales</b>, en especial el <b>etmoidal</b>."},
{cat:"Celulitis orbitaria · tto",c:3,q:"El tratamiento de la celulitis orbitaria es:",
 o:["Antibiótico tópico","Antibiótico oral ambulatorio","Observación","Ingreso + antibióticos IV (cefalosporina 3ª gen.) + drenaje de senos si sinusitis"],
 e:"La <b>celulitis orbitaria</b> requiere <b>ingreso, antibióticos IV</b> (cefalosporina de 3ª generación) y drenaje de senos si hay sinusitis."},
{cat:"Celulitis preseptal · tto",c:0,q:"El tratamiento de la celulitis preseptal es:",
 o:["Amoxicilina-clavulánico o cloxacilina oral","Antibióticos IV con ingreso","Cirugía urgente","Corticoides"],
 e:"La <b>celulitis preseptal</b> se trata con <b>amoxicilina-clavulánico o cloxacilina oral</b> (ambulatorio)."},
{cat:"Caso clínico · celulitis",c:1,case:true,
 lead:"Niño de 6 años con fiebre, dolor, edema palpebral y exoftalmos del ojo derecho no reductible, con limitación de la mirada y antecedente de sinusitis.",
 q:"Diagnóstico y actitud:",
 o:["Celulitis preseptal; antibiótico oral","Celulitis orbitaria; ingreso + antibióticos IV","Orbitopatía tiroidea; corticoides","Conjuntivitis; colirio"],
 e:"Fiebre + exoftalmos no reductible + limitación de la MOE tras sinusitis = <b>celulitis orbitaria</b>; <b>ingreso + antibióticos IV</b>."},
{cat:"Celulitis · DDx",c:2,ddx:true,q:"En un niño con celulitis orbitaria, ¿qué tumor hay que descartar?",
 o:["Retinoblastoma","Hemangioma","Rabdomiosarcoma","Glioma"],
 e:"En el <b>niño</b> hay que descartar el <b>rabdomiosarcoma</b> (tumor maligno orbitario más frecuente de la infancia)."},
{cat:"Orbitopatía tiroidea",c:3,q:"La orbitopatía tiroidea es una enfermedad:",
 o:["Infecciosa","Tumoral","Degenerativa","Autoinmune (tiroides + músculos y grasa orbitarios)"],
 e:"La <b>orbitopatía tiroidea</b> es una enfermedad <b>autoinmune</b> que afecta a la tiroides y a los músculos y grasa orbitarios."},
{cat:"Orbitopatía tiroidea",c:0,q:"El signo de Dalrymple en la orbitopatía tiroidea es:",
 o:["La retracción palpebral (por hiperfunción del músculo de Müller)","La proptosis","La diplopía","La quemosis"],
 e:"El <b>signo de Dalrymple</b> es la <b>retracción palpebral</b> (exposición de esclera) por hiperfunción del músculo de Müller."},
{cat:"Imagen · tiroidea",c:1,figSrc:"figTiroidea",figcap:"Aspecto del paciente.",
 q:"Esta protrusión ocular con retracción palpebral y esclera visible por encima del limbo sugiere:",
 o:["Celulitis orbitaria","Orbitopatía tiroidea","Pseudotumor","Hemorragia orbitaria"],
 e:"Proptosis + retracción palpebral = <b>orbitopatía tiroidea</b>."},
{cat:"Orbitopatía tiroidea",c:2,q:"El estado tiroideo del paciente con orbitopatía tiroidea:",
 o:["Siempre es hipertiroideo","Siempre es hipotiroideo","Puede ser hipo, eu o hipertiroideo","Siempre es eutiroideo"],
 e:"El paciente con <b>orbitopatía tiroidea</b> puede ser <b>hipo, eu o hipertiroideo</b> (la afectación ocular es autoinmune e independiente)."},
{cat:"Orbitopatía tiroidea",c:3,q:"La complicación visual grave de la orbitopatía tiroidea es:",
 o:["La conjuntivitis","El ojo seco leve","La catarata","La neuropatía óptica compresiva"],
 e:"La <b>neuropatía óptica compresiva</b> es la complicación grave (justifica la descompresión orbitaria)."},
{cat:"Orbitopatía tiroidea · tto",c:0,q:"Los casos moderados o graves de orbitopatía tiroidea se tratan con:",
 o:["Corticoides","Antibióticos","AntiVEGF","Observación exclusiva"],
 e:"Los casos moderados/graves de <b>orbitopatía tiroidea</b> se tratan con <b>corticoides</b> (± cirugía descompresiva/estrabismo/retracción)."},
{cat:"Orbitopatía tiroidea",c:1,q:"En la orbitopatía tiroidea, los músculos que más se hipertrofian son:",
 o:["Solo el elevador","El recto inferior y el recto medio (RI/RM)","Solo los oblicuos","Ninguno"],
 e:"En la <b>orbitopatía tiroidea</b> se hipertrofian sobre todo el <b>recto inferior y el recto medio</b> → fibrosis → diplopía/estrabismo restrictivo."},
{cat:"Imagen · TAC",c:2,figSrc:"figTAC",figcap:"TAC de órbitas.",
 q:"Esta TAC con engrosamiento de varios músculos extraoculares en ambas órbitas es típica de:",
 o:["Celulitis preseptal","Catarata","Orbitopatía tiroidea","Conjuntivitis"],
 e:"El <b>engrosamiento de los músculos extraoculares</b> bilateral es típico de la <b>orbitopatía tiroidea</b>."},
{cat:"Orbitopatía tiroidea",c:3,q:"En la orbitopatía tiroidea, el engrosamiento muscular característicamente:",
 o:["Afecta al tendón de inserción","Es solo del elevador","No existe","Respeta la inserción tendinosa"],
 e:"La <b>orbitopatía tiroidea</b> engrosa el vientre muscular <b>respetando el tendón</b> de inserción (a diferencia del pseudotumor)."},
{cat:"Pseudotumor",c:0,q:"El pseudotumor inflamatorio orbitario es:",
 o:["La 2ª causa de exoftalmos (idiopático, doloroso, responde a corticoides)","Un tumor maligno","Una infección bacteriana","Una catarata"],
 e:"El <b>pseudotumor</b> (inflamación orbitaria idiopática) es la <b>2ª causa de exoftalmos</b>, doloroso y con respuesta espectacular a <b>corticoides</b>."},
{cat:"Pseudotumor",c:1,q:"El pseudotumor inflamatorio es un diagnóstico:",
 o:["De confirmación inmediata","De exclusión (descartar otras etiologías)","Solo radiológico","Genético"],
 e:"El <b>pseudotumor</b> es un <b>diagnóstico de exclusión</b>: obliga a descartar otras causas; biopsia si es accesible o no responde."},
{cat:"Caso clínico · pseudotumor",c:2,case:true,
 lead:"Adulto con exoftalmos doloroso de un ojo, de instauración subaguda, sin fiebre ni leucocitosis; tras descartar otras causas, mejora espectacularmente con corticoides.",
 q:"El diagnóstico más probable es:",
 o:["Celulitis orbitaria","Orbitopatía tiroidea","Pseudotumor inflamatorio","Rabdomiosarcoma"],
 e:"Exoftalmos <b>doloroso</b> que <b>responde dramáticamente a corticoides</b> (diagnóstico de exclusión) = <b>pseudotumor inflamatorio</b>."},
{cat:"Vascular",c:3,q:"Un exoftalmos axial PULSÁTIL tras un traumatismo, con ojo congestivo 'en cabeza de medusa' y ↑PIO, sugiere:",
 o:["Pseudotumor","Celulitis","Orbitopatía tiroidea","Fístula carótido-cavernosa"],
 e:"Exoftalmos <b>axial pulsátil</b> + 'cabeza de medusa' + ↑PIO tras trauma = <b>fístula carótido-cavernosa</b>."},
{cat:"Imagen · vascular",c:0,figSrc:"figPulsatil",figcap:"Ojo del paciente traumatizado.",
 q:"Este ojo muy congestivo, con vasos dilatados 'en cabeza de medusa' y exoftalmos pulsátil, corresponde a:",
 o:["Fístula carótido-cavernosa","Conjuntivitis","Celulitis preseptal","Catarata"],
 e:"Vasos epiesclerales dilatados 'en cabeza de medusa' + exoftalmos pulsátil = <b>fístula carótido-cavernosa</b>."},
{cat:"Vascular",c:1,q:"Un exoftalmos INSTANTÁNEO orienta a:",
 o:["Orbitopatía tiroidea","Hemorragia orbitaria","Pseudotumor","Celulitis"],

const figMap={figPreOrb,figTiroidea,figPulsatil,figTAC};
const answers=new Array(Q.length).fill(null);let cur=0;
const $=id=>document.getElementById(id);
const stem=$("stem"),opts=$("opts"),explain=$("explain"),figure=$("figure"),qnum=$("qnum"),qtag=$("qtag"),bar=$("bar"),grid=$("grid");
function buildGrid(){grid.innerHTML="";Q.forEach((_,i)=>{const b=document.createElement("button");b.className="cell";b.textContent=i+1;b.onclick=()=>{cur=i;render();window.scrollTo({top:0,behavior:"smooth"});};grid.appendChild(b);});}
function refreshGrid(){[...grid.children].forEach((c,i)=>{c.classList.remove("cur","ok","no");if(i===cur)c.classList.add("cur");if(answers[i]!=null)c.classList.add(answers[i]===Q[i].c?"ok":"no");});}
function updateStats(){const ok=answers.filter((a,i)=>a===Q[i].c).length;const no=answers.filter((a,i)=>a!=null&&a!==Q[i].c).length;$("sOk").textContent=ok;$("sNo").textContent=no;$("sPos").innerHTML=(cur+1)+'<span style="font-size:13px;color:#9fc8cb">/80</span>';const done=answers.filter(a=>a!=null).length;bar.style.width=(done/Q.length*100)+"%";}
function render(){const q=Q[cur];qnum.textContent=String(cur+1).padStart(2,"0");qtag.textContent=q.cat;qtag.className="tag"+(q.case?" case":(q.ddx?" ddx":""));
  if(q.figSrc&&figMap[q.figSrc]){figure.innerHTML=`<div class="figure">${figMap[q.figSrc]}<div class="figcap">${q.figcap||""}</div></div>`;}else figure.innerHTML="";
  stem.innerHTML=(q.lead?`<span class="case-lead">${q.lead}</span>`:"")+q.q;
  const keys=["a","b","c","d"];opts.innerHTML="";const chosen=answers[cur];
  q.o.forEach((txt,i)=>{const b=document.createElement("button");b.className="opt";b.innerHTML=`<span class="key">${keys[i]}</span><span class="txt">${txt}</span>`;
    if(chosen!=null){b.classList.add("locked");if(i===q.c)b.classList.add("correct");else if(i===chosen)b.classList.add("wrong");else b.classList.add("dim");}else b.onclick=()=>choose(i);opts.appendChild(b);});
  if(chosen!=null){const ok=chosen===q.c;explain.className="explain show";explain.innerHTML=`<div class="verdict ${ok?'ok':'no'}">${ok?'✓ Correcto':'✗ Incorrecto · la respuesta es '+keys[q.c]+')'}</div>${q.e}`;}else{explain.className="explain";explain.innerHTML="";}
  $("prev").disabled=cur===0;$("next").textContent=cur===Q.length-1?"Ver resultados":"Siguiente →";updateStats();refreshGrid();}
function choose(i){if(answers[cur]!=null)return;answers[cur]=i;render();}
$("next").onclick=()=>{if(cur===Q.length-1)showResults();else{cur++;render();window.scrollTo({top:0,behavior:"smooth"});}};
$("prev").onclick=()=>{if(cur>0){cur--;render();window.scrollTo({top:0,behavior:"smooth"});}};
function showResults(){const ok=answers.filter((a,i)=>a===Q[i].c).length;const pct=Math.round(ok/Q.length*100);$("rOk").textContent=ok;let grade,msg;
  if(pct>=90){grade="Sobresaliente · ¡examen de 10!";msg="Dominas la patología orbitaria. A por el examen.";}
  else if(pct>=70){grade="Notable";msg="Buen nivel. Repasa los fallos en rojo, sobre todo celulitis preseptal vs orbitaria y el DDx del exoftalmos.";}
  else if(pct>=50){grade="Aprobado justo";msg="Base correcta; refuerza la orbitopatía tiroidea y el pseudotumor.";}
  else{grade="A reforzar";msg="Vuelve sobre el resumen del T23 (OJO CUIDADO) y repite el test.";}
  $("rGrade").textContent=grade;$("rMsg").textContent=`${ok}/80 aciertos (${pct}%). ${msg}`;$("results").classList.add("show");$("results").scrollIntoView({behavior:"smooth"});}
$("restart").onclick=()=>{answers.fill(null);cur=0;$("results").classList.remove("show");render();window.scrollTo({top:0,behavior:"smooth"});};
buildGrid();render();
</script>
</body>
