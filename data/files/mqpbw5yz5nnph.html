<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test T11 · Desprendimiento de Retina y Patología Vítreorretiniana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#eaeef0;--paper:#fff;--ink:#13232a;--ink-soft:#46585f;--teal:#0f4d57;--teal-deep:#0a3037;--amber:#cf8327;--amber-soft:#f6ecdc;--good:#1f7a4d;--good-bg:#e3f3ea;--bad:#b23a32;--bad-bg:#fbe7e4;--line:#d9e0e3;--shadow:0 10px 30px -16px rgba(10,48,55,.35);}
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;padding:18px 14px 60px}
  .wrap{max-width:760px;margin:0 auto}
  header.top{background:linear-gradient(135deg,var(--teal),var(--teal-deep));color:#eaf3f3;border-radius:18px;padding:22px 22px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  header.top::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#1c6b76,#0a3037 70%);box-shadow:inset 0 0 0 14px rgba(207,131,39,.25);opacity:.55}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#8fc3c7;font-weight:600;margin:0 0 6px}
  header.top h1{font-family:'Spectral',serif;font-weight:700;font-size:22px;line-height:1.15;margin:0 0 4px;position:relative;z-index:1}
  header.top p.sub{margin:0;font-size:13px;color:#bcd7d9;position:relative;z-index:1}
  .stats{display:flex;gap:10px;margin-top:16px;position:relative;z-index:1;flex-wrap:wrap}
  .stat{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:8px 12px;flex:1;min-width:84px}
  .stat .n{font-size:19px;font-weight:700;font-family:'Spectral',serif}.stat .l{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:#9fc8cb}
  .stat.good .n{color:#9ff0c2}.stat.bad .n{color:#ffb3ab}
  .progress{height:7px;background:rgba(255,255,255,.16);border-radius:99px;margin-top:14px;overflow:hidden;position:relative;z-index:1}
  .progress>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--amber),#e8a850);border-radius:99px;transition:width .35s}
  .card{background:var(--paper);border-radius:18px;box-shadow:var(--shadow);padding:22px 22px 20px;margin-top:18px;border:1px solid var(--line)}
  .qmeta{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .qnum{font-family:'Spectral',serif;font-weight:700;font-size:14px;color:var(--teal);background:var(--amber-soft);border:1px solid #ecdcc3;border-radius:8px;padding:3px 10px}
  .tag{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:var(--ink-soft);background:#eef2f3;border-radius:7px;padding:3px 9px}
  .tag.case{color:#8a4b12;background:#f6ecdc}.tag.ddx{color:#7a3a8f;background:#f1e6f4}
  .stem{font-family:'Spectral',serif;font-size:18px;line-height:1.4;margin:0 0 16px;font-weight:600}
  .stem .case-lead{display:block;font-weight:400;font-style:italic;color:var(--ink-soft);font-size:15px;margin-bottom:8px}
  .figure{margin:0 0 16px;background:#f5f8f8;border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
  .figure svg{max-width:100%;height:auto}.figcap{font-size:11.5px;color:var(--ink-soft);margin-top:6px;font-style:italic}
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{display:flex;gap:11px;align-items:flex-start;width:100%;background:#fbfcfc;border:1.5px solid var(--line);border-radius:12px;padding:12px 13px;cursor:pointer;font:inherit;font-size:14.5px;color:var(--ink);transition:.15s;text-align:left}
  .opt:hover:not(.locked){border-color:var(--teal);background:#f3f8f8}
  .opt .key{flex:none;width:24px;height:24px;border-radius:7px;background:#eef2f3;color:var(--ink-soft);font-weight:700;font-size:13px;display:grid;place-items:center;font-family:'Spectral',serif}
  .opt .txt{padding-top:1px}.opt.locked{cursor:default}
  .opt.correct{border-color:var(--good);background:var(--good-bg)}.opt.correct .key{background:var(--good);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--bad-bg)}.opt.wrong .key{background:var(--bad);color:#fff}
  .opt.dim{opacity:.6}
  .explain{margin-top:14px;border-left:4px solid var(--amber);background:var(--amber-soft);border-radius:0 12px 12px 0;padding:12px 14px;font-size:14px;display:none}
  .explain.show{display:block;animation:fade .3s}.explain b{color:var(--teal-deep)}
  .verdict{font-weight:700;font-family:'Spectral',serif;font-size:15px;margin-bottom:3px}.verdict.ok{color:var(--good)}.verdict.no{color:var(--bad)}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .nav{display:flex;gap:10px;margin-top:18px;align-items:center}
  .btn{font:inherit;font-weight:600;font-size:14px;border-radius:11px;padding:11px 18px;cursor:pointer;border:1.5px solid var(--teal);transition:.15s}
  .btn.ghost{background:#fff;color:var(--teal)}.btn.ghost:hover{background:#eef6f6}
  .btn.solid{background:var(--teal);color:#fff;margin-left:auto}.btn.solid:hover{background:var(--teal-deep)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .jumpwrap{margin-top:18px;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:16px 18px;box-shadow:var(--shadow)}
  .jumpwrap h3{margin:0 0 12px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
  .grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
  .cell{aspect-ratio:1;border:1.5px solid var(--line);border-radius:8px;background:#fbfcfc;font:inherit;font-size:12px;font-weight:600;color:var(--ink-soft);cursor:pointer;display:grid;place-items:center;transition:.12s}
  .cell:hover{border-color:var(--teal)}.cell.cur{border-color:var(--teal);box-shadow:0 0 0 2px rgba(15,77,87,.2)}
  .cell.ok{background:var(--good-bg);border-color:var(--good);color:var(--good)}.cell.no{background:var(--bad-bg);border-color:var(--bad);color:var(--bad)}
  .results{display:none;background:var(--paper);border-radius:18px;box-shadow:var(--shadow);padding:28px 24px;margin-top:18px;text-align:center;border:1px solid var(--line)}
  .results.show{display:block}
  .scoreBig{font-family:'Spectral',serif;font-size:58px;font-weight:700;color:var(--teal);line-height:1}.scoreBig small{font-size:24px;color:var(--ink-soft)}
  .grade{font-family:'Spectral',serif;font-size:22px;font-weight:600;margin-top:8px}.results p{color:var(--ink-soft);font-size:14.5px}
  @media(max-width:520px){.grid{grid-template-columns:repeat(8,1fr)}.stem{font-size:16.5px}header.top h1{font-size:19px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <p class="eyebrow">Oftalmología · 4º Medicina · T11</p>
    <h1>Desprendimiento de Retina y Patología Vítreorretiniana</h1>
    <p class="sub">80 preguntas · ≥20 casos clínicos · diagnóstico diferencial · respuesta razonada</p>
    <div class="stats">
      <div class="stat"><div class="n" id="sPos">1<span style="font-size:13px;color:#9fc8cb">/80</span></div><div class="l">Pregunta</div></div>
      <div class="stat good"><div class="n" id="sOk">0</div><div class="l">Aciertos</div></div>
      <div class="stat bad"><div class="n" id="sNo">0</div><div class="l">Fallos</div></div>
    </div>
    <div class="progress"><i id="bar"></i></div>
  </header>
  <main class="card" id="card">
    <div class="qmeta"><span class="qnum" id="qnum">01</span><span class="tag" id="qtag">Tema</span></div>
    <div id="figure"></div>
    <p class="stem" id="stem"></p>
    <div class="opts" id="opts"></div>
    <div class="explain" id="explain"></div>
    <div class="nav">
      <button class="btn ghost" id="prev">← Anterior</button>
      <button class="btn solid" id="next">Siguiente →</button>
    </div>
  </main>
  <section class="results" id="results">
    <div class="scoreBig"><span id="rOk">0</span><small>/80</small></div>
    <div class="grade" id="rGrade"></div>
    <p id="rMsg"></p>
    <button class="btn solid" style="margin:14px auto 0" id="restart">Repetir test</button>
  </section>
  <section class="jumpwrap"><h3>Navegación rápida</h3><div class="grid" id="grid"></div></section>
</div>

<script>
const figDVP=`<svg viewBox="0 0 240 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vítreo desprendido con anillo de Weiss y moscas volantes">
<ellipse cx="120" cy="75" rx="110" ry="62" fill="#eef3f1" stroke="#9fb3b6"/>
<path d="M22 75 Q90 30 180 55 Q210 75 180 95 Q90 120 22 75" fill="#cfe3ea" opacity=".5"/>
<circle cx="190" cy="75" r="9" fill="none" stroke="#7a3a8f" stroke-width="3"/>
<g fill="#46585f"><circle cx="100" cy="62" r="3"/><circle cx="118" cy="82" r="2.5"/><circle cx="88" cy="90" r="2"/></g>
</svg>`;
const figDesgarro=`<svg viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Desgarro retiniano en herradura con colgajo">
<circle cx="120" cy="80" r="72" fill="#d98c5a" stroke="#b8752f"/>
<path d="M120 40 Q140 50 138 72 L120 64 L102 72 Q100 50 120 40Z" fill="#7a1f17"/>
<text x="120" y="150" text-anchor="middle" style="font:400 11px Inter;fill:#7a2a25">desgarro en herradura (con flap)</text>
</svg>`;
const figDR=`<svg viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Retina desprendida bullosa con desgarro">
<circle cx="120" cy="80" r="74" fill="#d98c5a" stroke="#b8752f"/>
<path d="M52 80 Q110 28 180 50 Q200 80 180 110 Q110 132 52 80" fill="#e9b87a" opacity=".75" stroke="#caa46a"/>
<path d="M186 52 l14 -9 4 12 -12 6z" fill="#7a1f17"/>
<text x="120" y="152" text-anchor="middle" style="font:400 11px Inter;fill:#5a3a1a">retina elevada (bullosa) + desgarro</text>
</svg>`;
const figLattice=`<svg viewBox="0 0 240 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Degeneración en empalizada periférica">
<circle cx="120" cy="80" r="74" fill="#dd9a45" stroke="#b8752f"/>
<g transform="translate(150,46) rotate(35)"><rect x="0" y="0" width="48" height="20" rx="8" fill="#e9d3a8" stroke="#cdb46a"/>
<g stroke="#fff" stroke-width="1.4"><line x1="6" y1="2" x2="42" y2="18"/><line x1="6" y1="10" x2="42" y2="10"/><line x1="6" y1="18" x2="42" y2="2"/></g></g>
<text x="120" y="152" text-anchor="middle" style="font:400 11px Inter;fill:#5a3a1a">tramas de líneas blancas ('rejas') en la periferia</text>
</svg>`;

const Q=[
{cat:"DVP",c:1,q:"El desprendimiento de vítreo posterior (DVP) se produce por:",
 o:["Una rotura retiniana","Licuefacción e involución del vítreo (senilidad) con separación de la retina","Exudación coroidea","Tracción de membranas diabéticas"],
 e:"El <b>DVP</b> es la separación del vítreo de la retina por <b>licuefacción e involución</b> asociada a la senilidad; es muy frecuente."},
{cat:"DVP",c:2,q:"El DVP es importante porque:",
 o:["Produce cataratas","Cura el desprendimiento","Es el PRECURSOR del desprendimiento de retina (origen de las tracciones que causan desgarros)","No tiene consecuencias"],
 e:"El <b>DVP</b> es el <b>precursor del DR</b>: el factor más importante en la génesis de las tracciones vitreorretinianas que originan los desgarros."},
{cat:"DVP · clínica",c:3,q:"Las miodesopsias del DVP corresponden a:",
 o:["Destellos por tracción","Cortina de campo","Pérdida central","Percepción de moscas volantes (anillo de Weiss, glía, microhemorragias)"],
 e:"Las <b>miodesopsias</b> ('moscas volantes') reflejan el <b>anillo de Weiss</b>, fragmentos de glía/fibrillas y microhemorragias."},
{cat:"DVP · clínica",c:0,q:"Las fotopsias (destellos) del DVP se deben a:",
 o:["Tracción de la hialoides posterior sobre la retina en puntos de adherencia","Opacidad del cristalino","Edema macular","Isquemia retiniana"],
 e:"Las <b>fotopsias</b> aparecen por la <b>tracción de la hialoides</b> sobre la retina en los puntos de adherencia."},
{cat:"DVP · conducta",c:1,q:"Ante un DVP agudo sintomático (miodesopsias/fotopsias), la conducta OBLIGADA es:",
 o:["Tratamiento hipotensor","Explorar el fondo de ojo bajo MIDRIASIS para descartar rotura retiniana","Iniciar antiVEGF","Hacer un campo visual aislado"],
 e:"Es <b>obligado explorar el fondo de ojo bajo midriasis</b> para descartar una <b>rotura retiniana</b> asociada al DVP agudo."},
{cat:"Caso clínico · DVP",c:2,case:true,
 lead:"Mujer de 67 años con destellos luminosos nocturnos en el ojo izquierdo desde hace 3 días y, desde hoy, una zona oscura que se desplaza con la mirada. AV 1.0 en ambos ojos.",
 q:"¿Cuál es la actitud correcta?",
 o:["Tratar un glaucoma agudo con hipotensores","Confirmar el DVP solo con campo visual","Realizar fondo de ojo para descartar rotura retiniana o hemorragia vítrea (cuadro sugestivo de DVP)","Iniciar retinopexia neumática de inmediato"],
 e:"Fosfenos + mancha que se desplaza sugieren <b>DVP</b>, pero hay que hacer <b>fondo de ojo</b> para descartar <b>rotura retiniana o hemorragia vítrea</b>."},
{cat:"DVP · tto",c:3,q:"El tratamiento del DVP no complicado es:",
 o:["Vitrectomía sistemática","AntiVEGF","Cerclaje","No tiene tratamiento (si hay desgarro, se fotocoagula con láser)"],
 e:"El <b>DVP</b> no tiene tratamiento (controversia con la vitrectomía); si aparece un <b>desgarro</b>, se <b>fotocoagula con láser</b>."},
{cat:"Imagen · DVP",c:0,figSrc:"figDVP",figcap:"Esquema del paciente.",
 q:"El anillo desprendido frente a la papila que ve este paciente con miodesopsias es:",
 o:["El anillo de Weiss (signo de DVP)","Un desgarro gigante","Una membrana epirretiniana","Un nevus"],
 e:"El <b>anillo de Weiss</b> (anclaje vítreo-papila desprendido) es un signo del <b>DVP</b>."},
{cat:"Roturas",c:1,q:"Los agujeros retinianos se producen por:",
 o:["Tracción vitreorretiniana","Atrofia crónica de la retina (forma redondeada/oval)","Exudación coroidea","Inflamación"],
 e:"Los <b>agujeros</b> se deben a <b>atrofia crónica</b> (redondeados/ovales); los <b>desgarros</b>, a tracción."},
{cat:"Roturas · DDx",c:2,ddx:true,q:"Un desgarro en herradura ('U' con flap) se produce por:",
 o:["Atrofia","Exudación","Tracción vitreorretiniana","Isquemia"],
 e:"El <b>desgarro en herradura</b> (con flap) es por <b>tracción vitreorretiniana</b>; tiene alto riesgo de DR."},
{cat:"Imagen · roturas",c:3,figSrc:"figDesgarro",figcap:"Fondo de ojo del paciente.",
 q:"Esta rotura con forma de herradura y un colgajo corresponde a:",
 o:["Agujero atrófico","Diálisis retiniana","Agujero macular","Desgarro en herradura (por tracción)"],
 e:"La forma de <b>herradura con flap</b> es un <b>desgarro por tracción</b> (no un agujero atrófico)."},
{cat:"Roturas",c:0,q:"La diálisis retiniana consiste en:",
 o:["Desinserción de la retina en la ora serrata","Un agujero macular","Una hemorragia vítrea","Una membrana epirretiniana"],
 e:"La <b>diálisis retiniana</b> es la <b>desinserción de la ora serrata</b>; es un tipo de rotura (frecuente en traumatismos)."},
{cat:"Degeneraciones",c:1,q:"La degeneración periférica MÁS significativa como predisponente al DR es:",
 o:["La baba de caracol","La degeneración en empalizada (lattice)","Las drusas","El nevus"],
 e:"La <b>degeneración en empalizada (lattice)</b> es la más significativa; el 30–40% de los DR se asocian a ella."},
{cat:"Degeneraciones",c:2,q:"La degeneración en empalizada (lattice) es más frecuente en:",
 o:["Hipermétropes","Diabéticos","Miopes","Ancianos sanos"],
 e:"El <b>lattice</b> es más frecuente en <b>miopes</b> y aparece en la periferia (temporal superior)."},
{cat:"Imagen · lattice",c:3,figSrc:"figLattice",figcap:"Periferia retiniana del paciente.",
 q:"Estas tramas de líneas blancas ('rejas') en la periferia de un miope corresponden a:",
 o:["Drusas","Desgarro gigante","Mancha rojo cereza","Degeneración en empalizada (lattice)"],
 e:"Las <b>tramas de líneas blancas con adelgazamiento</b> en la periferia de un miope son la <b>degeneración en empalizada (lattice)</b>."},
{cat:"Degeneraciones",c:0,q:"La profilaxis de las lesiones predisponentes al DR se realiza con:",
 o:["Fotocoagulación con láser (diodo/argón)","AntiVEGF","Corticoides","Cirugía de catarata"],
 e:"La <b>fotocoagulación con láser</b> (diodo/argón) de las lesiones predisponentes evita la progresión a desprendimiento de retina."},
{cat:"DR · concepto",c:1,q:"El desprendimiento de retina consiste en:",
 o:["Opacidad del vítreo","Separación de la retina neurosensorial del EPR por líquido subretiniano","Inflamación de la coroides","Atrofia del nervio óptico"],
 e:"El <b>DR</b> es la <b>separación de la retina neurosensorial del EPR</b> por líquido en el espacio subretiniano."},
{cat:"DR · tipos",c:2,q:"El tipo de desprendimiento de retina MÁS FRECUENTE es:",
 o:["El traccional","El exudativo","El regmatógeno","El seroso"],
 e:"El <b>regmatógeno</b> es el más frecuente; requiere vítreo licuado y una rotura de espesor completo."},
{cat:"DR · regmatógeno",c:3,q:"El DR regmatógeno requiere:",
 o:["Solo una rotura","Solo vítreo licuado","Exudación coroidea","Vítreo licuado + rotura de espesor completo"],
 e:"El <b>DRR</b> requiere la concurrencia de <b>vítreo licuado y una rotura de espesor completo</b>."},
{cat:"DR · clínica",c:0,q:"La clínica típica del DR regmatógeno es:",
 o:["Fotopsias/miodesopsias seguidas de cortina de campo que progresa","Dolor intenso","Halos de colores","Pérdida central aislada sin síntomas previos"],
 e:"El <b>DRR</b> cursa con <b>fotopsias/miodesopsias</b> y luego una <b>cortina de campo visual</b> que avanza; si llega a la mácula, ↓ central."},
{cat:"Imagen · DR",c:1,figSrc:"figDR",figcap:"Fondo de ojo del paciente.",
 q:"Esta retina elevada y bullosa con un desgarro corresponde a:",
 o:["DVP no complicado","Desprendimiento de retina regmatógeno","Membrana epirretiniana","Coroidopatía serosa"],
 e:"Retina <b>elevada/bullosa + desgarro</b> = <b>desprendimiento de retina regmatógeno</b>."},
{cat:"DR · DDx tipos",c:2,ddx:true,q:"¿Qué tipo de DR se precede de fotopsias y miodesopsias?",
 o:["El traccional","El exudativo","Solo el regmatógeno","Los tres por igual"],
 e:"Solo el <b>regmatógeno</b> se precede de <b>fotopsias/miodesopsias</b>; el traccional y el exudativo no."},
{cat:"DR · traccional",c:3,q:"El DR traccional se asocia típicamente a:",
 o:["Tumor coroideo","HTA maligna","Lattice","Retinopatía diabética proliferativa avanzada (y ROP, trauma penetrante)"],
 e:"El <b>DR traccional</b> se debe a tracción de membranas; causas típicas: <b>RDP avanzada, ROP y traumatismos penetrantes</b>."},
{cat:"DR · exudativo",c:0,q:"El DR exudativo (seroso) se produce por:",
 o:["Exudación desde la coroides por alteración del EPR (BHE externa)","Rotura retiniana","Tracción vítrea","Licuefacción del vítreo"],
 e:"El <b>DR exudativo</b> se debe a <b>exudación desde la coroides</b> a través de una alteración del EPR (barrera hematorretiniana externa)."},
{cat:"DR · exudativo",c:1,q:"Una causa típica de DR exudativo es:",
 o:["Lattice","Tumor coroideo (también HTA maligna/eclampsia, Harada, escleritis posterior)","Miopía magna","Afaquia"],
 e:"El <b>DR exudativo</b> aparece en <b>tumores coroideos, HTA maligna/eclampsia, coroiditis exudativa (Harada) y escleritis posterior</b>."},
{cat:"DR · tto",c:2,q:"El tratamiento del DR EXUDATIVO es:",
 o:["Vitrectomía urgente","Cerclaje","Médico, tratando la enfermedad de base","Retinopexia neumática"],
 e:"El <b>DR exudativo</b> se trata <b>médicamente</b>, atacando la <b>enfermedad de base</b> (no se opera la retina)."},
{cat:"DR · tto",c:3,q:"El tratamiento del DR regmatógeno es:",
 o:["Médico","Observación","Láser aislado","Exclusivamente quirúrgico (vitrectomía la más usada)"],
 e:"El <b>DRR</b> tiene tratamiento <b>exclusivamente quirúrgico</b>; la <b>vitrectomía (VPP)</b> es la técnica más usada por su alto éxito."},
{cat:"Caso clínico · DR regmatógeno",c:0,case:true,
 lead:"Varón miope de 55 años con destellos y moscas volantes que desde hace un día nota una 'cortina' negra que asciende en su campo visual; la AV central aún está conservada.",
 q:"El diagnóstico y la actitud son:",
 o:["DR regmatógeno; cirugía (urgente, mácula aún 'on')","DMAE húmeda; antiVEGF","Glaucoma agudo; hipotensores","Catarata; cirugía programada"],

const $=id=>document.getElementById(id);
const stem=$("stem"),opts=$("opts"),explain=$("explain"),figure=$("figure"),qnum=$("qnum"),qtag=$("qtag"),bar=$("bar"),grid=$("grid");
function buildGrid(){grid.innerHTML="";Q.forEach((_,i)=>{const b=document.createElement("button");b.className="cell";b.textContent=i+1;b.onclick=()=>{cur=i;render();window.scrollTo({top:0,behavior:"smooth"});};grid.appendChild(b);});}
function refreshGrid(){[...grid.children].forEach((c,i)=>{c.classList.remove("cur","ok","no");if(i===cur)c.classList.add("cur");if(answers[i]!=null)c.classList.add(answers[i]===Q[i].c?"ok":"no");});}
function updateStats(){const ok=answers.filter((a,i)=>a===Q[i].c).length;const no=answers.filter((a,i)=>a!=null&&a!==Q[i].c).length;$("sOk").textContent=ok;$("sNo").textContent=no;$("sPos").innerHTML=(cur+1)+'<span style="font-size:13px;color:#9fc8cb">/80</span>';const done=answers.filter(a=>a!=null).length;bar.style.width=(done/Q.length*100)+"%";}
function render(){const q=Q[cur];qnum.textContent=String(cur+1).padStart(2,"0");qtag.textContent=q.cat;qtag.className="tag"+(q.case?" case":(q.ddx?" ddx":""));
  if(q.figSrc&&figMap[q.figSrc]){figure.innerHTML=`<div class="figure">${figMap[q.figSrc]}<div class="figcap">${q.figcap||""}</div></div>`;}else figure.innerHTML="";
  stem.innerHTML=(q.lead?`<span class="case-lead">${q.lead}</span>`:"")+q.q;
  const keys=["a","b","c","d"];opts.innerHTML="";const chosen=answers[cur];
  q.o.forEach((txt,i)=>{const b=document.createElement("button");b.className="opt";b.innerHTML=`<span class="key">${keys[i]}</span><span class="txt">${txt}</span>`;
    if(chosen!=null){b.classList.add("locked");if(i===q.c)b.classList.add("correct");else if(i===chosen)b.classList.add("wrong");else b.classList.add("dim");}else b.onclick=()=>choose(i);opts.appendChild(b);});
  if(chosen!=null){const ok=chosen===q.c;explain.className="explain show";explain.innerHTML=`<div class="verdict ${ok?'ok':'no'}">${ok?'✓ Correcto':'✗ Incorrecto · la respuesta es '+keys[q.c]+')'}</div>${q.e}`;}else{explain.className="explain";explain.innerHTML="";}
  $("prev").disabled=cur===0;$("next").textContent=cur===Q.length-1?"Ver resultados":"Siguiente →";updateStats();refreshGrid();}
function choose(i){if(answers[cur]!=null)return;answers[cur]=i;render();}
$("next").onclick=()=>{if(cur===Q.length-1)showResults();else{cur++;render();window.scrollTo({top:0,behavior:"smooth"});}};
$("prev").onclick=()=>{if(cur>0){cur--;render();window.scrollTo({top:0,behavior:"smooth"});}};
function showResults(){const ok=answers.filter((a,i)=>a===Q[i].c).length;const pct=Math.round(ok/Q.length*100);$("rOk").textContent=ok;let grade,msg;
  if(pct>=90){grade="Sobresaliente · ¡examen de 10!";msg="Dominas el desprendimiento de retina. A por el examen.";}
  else if(pct>=70){grade="Notable";msg="Buen nivel. Repasa los fallos en rojo, sobre todo los 3 tipos de DR y la conducta ante el DVP.";}
  else if(pct>=50){grade="Aprobado justo";msg="Base correcta; refuerza regmatógeno vs traccional vs exudativo y el tratamiento.";}
  else{grade="A reforzar";msg="Vuelve sobre el resumen del T11 (OJO CUIDADO) y repite el test.";}
  $("rGrade").textContent=grade;$("rMsg").textContent=`${ok}/80 aciertos (${pct}%). ${msg}`;$("results").classList.add("show");$("results").scrollIntoView({behavior:"smooth"});}
$("restart").onclick=()=>{answers.fill(null);cur=0;$("results").classList.remove("show");render();window.scrollTo({top:0,behavior:"smooth"});};
buildGrid();render();
</script>
