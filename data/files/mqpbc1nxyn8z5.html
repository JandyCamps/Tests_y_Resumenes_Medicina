<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test T13–14 · Neuroftalmología</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#eaeef0;--paper:#fff;--ink:#13232a;--ink-soft:#46585f;--teal:#0f4d57;--teal-deep:#0a3037;--amber:#cf8327;--amber-soft:#f6ecdc;--good:#1f7a4d;--good-bg:#e3f3ea;--bad:#b23a32;--bad-bg:#fbe7e4;--line:#d9e0e3;--shadow:0 10px 30px -16px rgba(10,48,55,.35);}
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;padding:18px 14px 60px}
  .wrap{max-width:760px;margin:0 auto}
  header.top{background:linear-gradient(135deg,var(--teal),var(--teal-deep));color:#eaf3f3;border-radius:18px;padding:22px 22px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  header.top::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#1c6b76,#0a3037 70%);box-shadow:inset 0 0 0 14px rgba(207,131,39,.25);opacity:.55}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#8fc3c7;font-weight:600;margin:0 0 6px}
  header.top h1{font-family:'Spectral',serif;font-weight:700;font-size:23px;line-height:1.15;margin:0 0 4px;position:relative;z-index:1}
  header.top p.sub{margin:0;font-size:13px;color:#bcd7d9;position:relative;z-index:1}
  .stats{display:flex;gap:10px;margin-top:16px;position:relative;z-index:1;flex-wrap:wrap}
  .stat{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:8px 12px;flex:1;min-width:84px}
  .stat .n{font-size:19px;font-weight:700;font-family:'Spectral',serif}.stat .l{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:#9fc8cb}
  .stat.good .n{color:#9ff0c2}.stat.bad .n{color:#ffb3ab}
  .progress{height:7px;background:rgba(255,255,255,.16);border-radius:99px;margin-top:14px;overflow:hidden;position:relative;z-index:1}
  .progress>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--amber),#e8a850);border-radius:99px;transition:width .35s}
  .card{background:var(--paper);border-radius:18px;box-shadow:var(--shadow);padding:22px 22px 20px;margin-top:18px;border:1px solid var(--line)}
  .qmeta{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .qnum{font-family:'Spectral',serif;font-weight:700;font-size:14px;color:var(--teal);background:var(--amber-soft);border:1px solid #ecdcc3;border-radius:8px;padding:3px 10px}
  .tag{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:var(--ink-soft);background:#eef2f3;border-radius:7px;padding:3px 9px}
  .tag.case{color:#8a4b12;background:#f6ecdc}.tag.ddx{color:#7a3a8f;background:#f1e6f4}
  .stem{font-family:'Spectral',serif;font-size:18px;line-height:1.4;margin:0 0 16px;font-weight:600}
  .stem .case-lead{display:block;font-weight:400;font-style:italic;color:var(--ink-soft);font-size:15px;margin-bottom:8px}
  .figure{margin:0 0 16px;background:#f5f8f8;border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
  .figure svg{max-width:100%;height:auto}.figcap{font-size:11.5px;color:var(--ink-soft);margin-top:6px;font-style:italic}
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{display:flex;gap:11px;align-items:flex-start;width:100%;background:#fbfcfc;border:1.5px solid var(--line);border-radius:12px;padding:12px 13px;cursor:pointer;font:inherit;font-size:14.5px;color:var(--ink);transition:.15s;text-align:left}
  .opt:hover:not(.locked){border-color:var(--teal);background:#f3f8f8}
  .opt .key{flex:none;width:24px;height:24px;border-radius:7px;background:#eef2f3;color:var(--ink-soft);font-weight:700;font-size:13px;display:grid;place-items:center;font-family:'Spectral',serif}
  .opt .txt{padding-top:1px}.opt.locked{cursor:default}
  .opt.correct{border-color:var(--good);background:var(--good-bg)}.opt.correct .key{background:var(--good);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--bad-bg)}.opt.wrong .key{background:var(--bad);color:#fff}
  .opt.dim{opacity:.6}
  .explain{margin-top:14px;border-left:4px solid var(--amber);background:var(--amber-soft);border-radius:0 12px 12px 0;padding:12px 14px;font-size:14px;display:none}
  .explain.show{display:block;animation:fade .3s}.explain b{color:var(--teal-deep)}
  .verdict{font-weight:700;font-family:'Spectral',serif;font-size:15px;margin-bottom:3px}.verdict.ok{color:var(--good)}.verdict.no{color:var(--bad)}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .nav{display:flex;gap:10px;margin-top:18px;align-items:center}
  .btn{font:inherit;font-weight:600;font-size:14px;border-radius:11px;padding:11px 18px;cursor:pointer;border:1.5px solid var(--teal);transition:.15s}
  .btn.ghost{background:#fff;color:var(--teal)}.btn.ghost:hover{background:#eef6f6}
  .btn.solid{background:var(--teal);color:#fff;margin-left:auto}.btn.solid:hover{background:var(--teal-deep)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .jumpwrap{margin-top:18px;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:16px 18px;box-shadow:var(--shadow)}
  .jumpwrap h3{margin:0 0 12px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
  .grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
  .cell{aspect-ratio:1;border:1.5px solid var(--line);border-radius:8px;background:#fbfcfc;font:inherit;font-size:12px;font-weight:600;color:var(--ink-soft);cursor:pointer;display:grid;place-items:center;transition:.12s}
  .cell:hover{border-color:var(--teal)}.cell.cur{border-color:var(--teal);box-shadow:0 0 0 2px rgba(15,77,87,.2)}
  .cell.ok{background:var(--good-bg);border-color:var(--good);color:var(--good)}.cell.no{background:var(--bad-bg);border-color:var(--bad);color:var(--bad)}
  .results{display:none;background:var(--paper);border-radius:18px;box-shadow:var(--shadow);padding:28px 24px;margin-top:18px;text-align:center;border:1px solid var(--line)}
  .results.show{display:block}
  .scoreBig{font-family:'Spectral',serif;font-size:58px;font-weight:700;color:var(--teal);line-height:1}.scoreBig small{font-size:24px;color:var(--ink-soft)}
  .grade{font-family:'Spectral',serif;font-size:22px;font-weight:600;margin-top:8px}.results p{color:var(--ink-soft);font-size:14.5px}
  @media(max-width:520px){.grid{grid-template-columns:repeat(8,1fr)}.stem{font-size:16.5px}header.top h1{font-size:20px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <p class="eyebrow">Oftalmología · 4º Medicina · T13–14</p>
    <h1>Neuroftalmología</h1>
    <p class="sub">80 preguntas · ≥20 casos clínicos · diagnóstico diferencial · respuesta razonada</p>
    <div class="stats">
      <div class="stat"><div class="n" id="sPos">1<span style="font-size:13px;color:#9fc8cb">/80</span></div><div class="l">Pregunta</div></div>
      <div class="stat good"><div class="n" id="sOk">0</div><div class="l">Aciertos</div></div>
      <div class="stat bad"><div class="n" id="sNo">0</div><div class="l">Fallos</div></div>
    </div>
    <div class="progress"><i id="bar"></i></div>
  </header>
  <main class="card" id="card">
    <div class="qmeta"><span class="qnum" id="qnum">01</span><span class="tag" id="qtag">Tema</span></div>
    <div id="figure"></div>
    <p class="stem" id="stem"></p>
    <div class="opts" id="opts"></div>
    <div class="explain" id="explain"></div>
    <div class="nav">
      <button class="btn ghost" id="prev">← Anterior</button>
      <button class="btn solid" id="next">Siguiente →</button>
    </div>
  </main>
  <section class="results" id="results">
    <div class="scoreBig"><span id="rOk">0</span><small>/80</small></div>
    <div class="grade" id="rGrade"></div>
    <p id="rMsg"></p>
    <button class="btn solid" style="margin:14px auto 0" id="restart">Repetir test</button>
  </section>
  <section class="jumpwrap"><h3>Navegación rápida</h3><div class="grid" id="grid"></div></section>
</div>

<script>
const figHorner=`<svg viewBox="0 0 320 110" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ojo con ptosis y miosis (Horner)">
<path d="M30 55 Q80 30 130 55 Q80 80 30 55Z" fill="#fff" stroke="#7a8b90"/><circle cx="80" cy="55" r="20" fill="#9a6a3c"/><circle cx="80" cy="55" r="9" fill="#1a1a1a"/>
<path d="M190 58 Q240 42 290 58 Q240 74 190 58Z" fill="#fff" stroke="#7a8b90"/><path d="M190 58 Q240 42 290 58" fill="#e8d9c8" stroke="#a98"/><circle cx="240" cy="58" r="20" fill="#9a6a3c"/><circle cx="240" cy="58" r="5" fill="#1a1a1a"/>
<text x="80" y="100" text-anchor="middle" style="font:400 10px Inter;fill:#46585f">normal</text><text x="240" y="100" text-anchor="middle" style="font:600 10px Inter;fill:#b23a32">ptosis + miosis</text></svg>`;
const figPapila=`<svg viewBox="0 0 220 170" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Papila edematosa con hemorragias">
<circle cx="110" cy="85" r="78" fill="#dd9a45" stroke="#b8752f"/>
<circle cx="110" cy="85" r="30" fill="#f0d9a0" stroke="#caa24e" stroke-width="3"/><circle cx="110" cy="85" r="30" fill="none" stroke="#e6c98a" stroke-width="8" opacity=".6"/>
<g fill="#9c2b22"><path d="M138 70 l8 -3 -2 9z"/><path d="M84 98 l8 -3 -2 9z"/><path d="M130 102 l8 -3 -2 9z"/></g></svg>`;
const figBitemp=`<svg viewBox="0 0 320 130" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Campo visual con hemianopsia bitemporal">
<circle cx="85" cy="65" r="48" fill="#fff" stroke="#444"/><path d="M85 17 A48 48 0 0 0 85 113 Z" fill="#cfd6da"/><text x="85" y="124" text-anchor="middle" style="font:600 10px Inter;fill:#444">OD</text>
<circle cx="235" cy="65" r="48" fill="#fff" stroke="#444"/><path d="M235 17 A48 48 0 0 1 235 113 Z" fill="#cfd6da"/><text x="235" y="124" text-anchor="middle" style="font:600 10px Inter;fill:#444">OI</text>
<text x="160" y="14" text-anchor="middle" style="font:600 11px Spectral,serif;fill:#7a3a8f">hemianopsia bitemporal</text></svg>`;
const figVia=`<svg viewBox="0 0 420 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vía visual">
<circle cx="40" cy="45" r="13" fill="#cfe3ea" stroke="#7fa6b5"/><circle cx="40" cy="105" r="13" fill="#cfe3ea" stroke="#7fa6b5"/>
<line x1="53" y1="45" x2="150" y2="68" stroke="#444"/><line x1="53" y1="105" x2="150" y2="82" stroke="#444"/>
<path d="M150 68 L150 82 L170 75Z" fill="#7a3a8f"/>
<line x1="170" y1="75" x2="260" y2="55" stroke="#444"/><line x1="170" y1="75" x2="260" y2="95" stroke="#444"/>
<rect x="260" y="45" width="24" height="60" rx="6" fill="#e8d3a8" stroke="#caa24e"/>
<line x1="284" y1="55" x2="370" y2="55" stroke="#444"/><line x1="284" y1="95" x2="370" y2="95" stroke="#444"/>
<rect x="370" y="50" width="22" height="50" rx="5" fill="#d7c0e0" stroke="#9a6aa8"/>
<text x="160" y="30" text-anchor="middle" style="font:600 10px Inter;fill:#7a3a8f">quiasma</text></svg>`;

const Q=[
{cat:"Concepto",c:1,q:"La neuroftalmología estudia la patología que afecta a:",
 o:["Solo la retina","El sistema nervioso produciendo síntomas visuales (pares II-VII, vía visual, corteza)","Solo la córnea","Solo el cristalino"],
 e:"La <b>neuroftalmología</b> abarca la patología del <b>SN con síntomas visuales</b>: pares craneales II-VII, vía visual y corteza occipital."},
{cat:"Pupila · Horner",c:2,q:"El síndrome de Horner se debe a una lesión de la vía:",
 o:["Parasimpática","Del III par","Simpática","Del nervio óptico"],
 e:"El <b>síndrome de Horner</b> es por lesión de la vía <b>simpática</b> oculosimpática."},
{cat:"Pupila · Horner",c:3,q:"La tríada clásica del síndrome de Horner es:",
 o:["Midriasis, exoftalmos y lagrimeo","Ptosis, midriasis y exoftalmos","Miosis, midriasis y ptosis","Miosis, ptosis y enoftalmos aparente"],
 e:"El <b>Horner</b> cursa con <b>miosis + ptosis (músculo de Müller) + enoftalmos aparente</b> (± anhidrosis)."},
{cat:"Imagen · Horner",c:0,figSrc:"figHorner",figcap:"Ojos del paciente.",
 q:"Este ojo con ptosis leve y pupila pequeña corresponde a:",
 o:["Síndrome de Horner","Parálisis del III par","Pupila de Adie","Papiledema"],
 e:"<b>Ptosis + miosis</b> = <b>síndrome de Horner</b> (lesión simpática)."},
{cat:"Pupila · Horner",c:1,q:"En el síndrome de Horner infantil es característica:",
 o:["La midriasis","La hipocromía (heterocromía) del iris","El exoftalmos","La catarata"],
 e:"En el <b>Horner congénito/infantil</b> aparece <b>hipocromía de iris</b> (el iris afecto es más claro)."},
{cat:"Pupila · Horner",c:2,q:"El déficit de sudación (anhidrosis) en el Horner indica que la lesión es:",
 o:["Posganglionar","En el iris","Previa a la bifurcación carotídea (preganglionar)","En la retina"],
 e:"La <b>anhidrosis</b> facial aparece cuando la lesión es <b>previa a la bifurcación carotídea</b> (las fibras sudomotoras viajan con la carótida externa)."},
{cat:"Pupila · DDx",c:3,ddx:true,q:"La pupila de Argyll-Robertson (sífilis) se caracteriza por:",
 o:["Midriasis arreactiva","Anisocoria con ptosis","Respuesta normal","Disociación luz-acomodación (mala respuesta a la luz, buena a la acomodación)"],
 e:"La <b>pupila de Argyll-Robertson</b> (sífilis) muestra <b>disociación luz-acomodación</b>: acomoda pero no reacciona a la luz; suele ser miótica."},
{cat:"Pupila · DDx",c:0,ddx:true,q:"La pupila de Adie (tónica) típica es:",
 o:["Midriasis con respuesta lenta en una mujer joven","Miosis bilateral","Anisocoria con anhidrosis","Pupila normal"],
 e:"La <b>pupila de Adie</b> es una <b>midriasis tónica</b> (respuesta lenta) por lesión del ganglio ciliar, típica en mujeres jóvenes."},
{cat:"Pupila · DPAR",c:1,q:"El defecto pupilar aferente (DPAR o Marcus Gunn) indica:",
 o:["Una catarata","Lesión del nervio óptico o retiniana extensa","Una conjuntivitis","Un glaucoma agudo"],
 e:"El <b>DPAR</b> (test de la luz oscilante) indica <b>lesión del nervio óptico</b> o retiniana extensa (vía aferente)."},
{cat:"Vía visual",c:2,q:"Un defecto campimétrico MONOCULAR localiza la lesión:",
 o:["En la corteza occipital","En las radiaciones","Delante del quiasma (retina o nervio óptico)","En la cintilla óptica"],
 e:"Un defecto <b>monocular</b> sitúa la lesión <b>delante del quiasma</b> (retina o nervio óptico)."},
{cat:"Vía visual",c:3,q:"Una hemianopsia BITEMPORAL (heterónima) localiza la lesión en:",
 o:["La corteza occipital","Las radiaciones","La cintilla","El quiasma óptico (p. ej. adenoma hipofisario)"],
 e:"La <b>hemianopsia bitemporal</b> es por compresión del <b>quiasma</b> (clásico del <b>adenoma hipofisario</b>)."},
{cat:"Imagen · vía",c:0,figSrc:"figBitemp",figcap:"Campo visual del paciente.",
 q:"Este patrón campimétrico (pérdida de las mitades temporales de ambos ojos) corresponde a una lesión:",
 o:["Del quiasma (hemianopsia bitemporal)","Monocular","De la corteza occipital","Retiniana"],
 e:"La pérdida de los <b>campos temporales bilaterales</b> = <b>hemianopsia bitemporal</b> = lesión del <b>quiasma</b>."},
{cat:"Vía visual",c:1,q:"Una hemianopsia HOMÓNIMA contralateral localiza la lesión:",
 o:["Delante del quiasma","Retroquiasmática (cintilla, radiaciones, corteza)","En la retina","En el cristalino"],
 e:"La <b>hemianopsia homónima</b> sitúa la lesión <b>retroquiasmática</b> (contralateral al defecto)."},
{cat:"Caso clínico · vía",c:2,case:true,
 lead:"Mujer de 45 años con cefalea y, en la campimetría, pérdida de los campos temporales de ambos ojos; en la RM se objetiva una masa selar.",
 q:"El diagnóstico es:",
 o:["Neuritis óptica","Glaucoma","Compresión quiasmática por adenoma hipofisario (hemianopsia bitemporal)","Catarata"],
 e:"Hemianopsia <b>bitemporal</b> + masa selar = <b>compresión del quiasma por un adenoma hipofisario</b>."},
{cat:"Papiledema",c:3,q:"El papiledema es:",
 o:["Un edema macular","Una opacidad del cristalino","Un desprendimiento de retina","Un edema de papila BILATERAL por hipertensión intracraneal"],
 e:"El <b>papiledema</b> es el <b>edema de papila bilateral</b> secundario a <b>hipertensión intracraneal (HIC)</b>."},
{cat:"Papiledema",c:0,q:"La hipertensión intracraneal idiopática (pseudotumor cerebri) afecta típicamente a:",
 o:["Mujeres jóvenes/edad media, obesas","Ancianos delgados","Niños varones","Recién nacidos"],
 e:"La <b>HTIC idiopática</b> afecta sobre todo a <b>mujeres jóvenes/edad media, obesas</b>."},
{cat:"Papiledema",c:1,q:"En el papiledema por HIC, respecto a la agudeza visual:",
 o:["Se pierde de inmediato","Es buena al inicio (se pierde tarde, con la atrofia óptica)","Mejora","Es normal siempre"],
 e:"En el <b>papiledema</b> la <b>AV es buena al inicio</b>; la pérdida visual aparece tarde (atrofia óptica)."},
{cat:"Papiledema",c:2,q:"La parálisis del VI par que acompaña a la HIC es un ejemplo de:",
 o:["Aneurisma","Tumor del seno cavernoso","Falso localizador (compresión del VI contra el peñasco)","Diabetes"],
 e:"La <b>parálisis del VI par en la HIC</b> es un <b>falso localizador</b> (se comprime contra el peñasco / canal de Dorello)."},
{cat:"Caso clínico · papiledema",c:3,case:true,
 lead:"Mujer de 30 años, obesa, con cefalea, tinnitus pulsátil y oscurecimientos visuales transitorios; el fondo muestra edema de papila bilateral y la AV es normal.",
 q:"El diagnóstico más probable es:",
 o:["Neuritis óptica","NOIA arterítica","Glaucoma agudo","Hipertensión intracraneal idiopática (papiledema)"],
 e:"Mujer joven obesa + cefalea/tinnitus + <b>edema de papila bilateral</b> con AV conservada = <b>HTIC idiopática</b> (papiledema)."},
{cat:"Neuritis óptica",c:0,q:"La neuritis óptica desmielinizante afecta típicamente a:",
 o:["Mujeres jóvenes (asociación con esclerosis múltiple)","Ancianos","Niños","Varones de edad media"],
 e:"La <b>neuritis óptica</b> afecta a <b>mujeres jóvenes</b> y tiene una asociación clara con la <b>esclerosis múltiple</b>."},
{cat:"Neuritis óptica",c:1,q:"La clínica típica de la neuritis óptica es:",
 o:["Pérdida visual bilateral indolora","Pérdida visual MONOCULAR con dolor con los movimientos oculares","Ojo rojo doloroso","Halos de colores"],
 e:"La <b>neuritis óptica</b> da <b>pérdida visual monocular</b> con <b>dolor con los movimientos oculares</b> y DPAR."},
{cat:"Neuritis óptica",c:2,q:"En la neuritis óptica RETROBULBAR, el fondo de ojo:",
 o:["Muestra edema de papila","Muestra hemorragias","Es normal ('el paciente no ve y el médico tampoco ve nada')","Muestra mancha rojo cereza"],
 e:"En la forma <b>retrobulbar</b> el fondo es <b>normal</b> (la inflamación es posterior); de ahí la frase clásica."},
{cat:"Neuritis óptica",c:3,q:"Respecto al tratamiento de la neuritis óptica desmielinizante:",
 o:["Es curativo y cambia el pronóstico","No se trata nunca","Se opera","Las megadosis de corticoides IV aceleran la recuperación visual pero NO cambian el pronóstico"],
 e:"Los <b>corticoides IV</b> en megadosis <b>aceleran la recuperación visual</b> pero <b>no modifican el pronóstico</b> visual ni el riesgo de EM."},
{cat:"Neuritis óptica",c:0,q:"El pronóstico de la neuritis óptica es:",
 o:["Visual bueno, pero vital no tan bueno (riesgo de EM)","Visual y vital malos","Excelente en todo","Mortal a corto plazo"],
 e:"El <b>pronóstico visual</b> de la neuritis óptica suele ser <b>bueno</b>; el <b>vital</b> no tanto por el <b>riesgo de esclerosis múltiple</b>."},
{cat:"Caso clínico · neuritis",c:1,case:true,
 lead:"Mujer de 28 años con pérdida visual de un ojo en pocos días y dolor al moverlo; el fondo de ojo es normal y hay DPAR.",
 q:"El diagnóstico más probable y la prueba a solicitar son:",
 o:["NOIA; VSG","Neuritis óptica retrobulbar; RM cerebral (descartar EM)","Glaucoma; gonioscopia","Catarata; biometría"],
 e:"Mujer joven + pérdida monocular + dolor con los movimientos + fondo normal + DPAR = <b>neuritis óptica retrobulbar</b>; pedir <b>RM</b> (EM)."},

const figMap={figHorner,figPapila,figBitemp,figVia};
const answers=new Array(Q.length).fill(null);let cur=0;
const $=id=>document.getElementById(id);
const stem=$("stem"),opts=$("opts"),explain=$("explain"),figure=$("figure"),qnum=$("qnum"),qtag=$("qtag"),bar=$("bar"),grid=$("grid");
function buildGrid(){grid.innerHTML="";Q.forEach((_,i)=>{const b=document.createElement("button");b.className="cell";b.textContent=i+1;b.onclick=()=>{cur=i;render();window.scrollTo({top:0,behavior:"smooth"});};grid.appendChild(b);});}
function refreshGrid(){[...grid.children].forEach((c,i)=>{c.classList.remove("cur","ok","no");if(i===cur)c.classList.add("cur");if(answers[i]!=null)c.classList.add(answers[i]===Q[i].c?"ok":"no");});}
function updateStats(){const ok=answers.filter((a,i)=>a===Q[i].c).length;const no=answers.filter((a,i)=>a!=null&&a!==Q[i].c).length;$("sOk").textContent=ok;$("sNo").textContent=no;$("sPos").innerHTML=(cur+1)+'<span style="font-size:13px;color:#9fc8cb">/80</span>';const done=answers.filter(a=>a!=null).length;bar.style.width=(done/Q.length*100)+"%";}
function render(){const q=Q[cur];qnum.textContent=String(cur+1).padStart(2,"0");qtag.textContent=q.cat;qtag.className="tag"+(q.case?" case":(q.ddx?" ddx":""));
  if(q.figSrc&&figMap[q.figSrc]){figure.innerHTML=`<div class="figure">${figMap[q.figSrc]}<div class="figcap">${q.figcap||""}</div></div>`;}else figure.innerHTML="";
  stem.innerHTML=(q.lead?`<span class="case-lead">${q.lead}</span>`:"")+q.q;
  const keys=["a","b","c","d"];opts.innerHTML="";const chosen=answers[cur];
  q.o.forEach((txt,i)=>{const b=document.createElement("button");b.className="opt";b.innerHTML=`<span class="key">${keys[i]}</span><span class="txt">${txt}</span>`;
    if(chosen!=null){b.classList.add("locked");if(i===q.c)b.classList.add("correct");else if(i===chosen)b.classList.add("wrong");else b.classList.add("dim");}else b.onclick=()=>choose(i);opts.appendChild(b);});
  if(chosen!=null){const ok=chosen===q.c;explain.className="explain show";explain.innerHTML=`<div class="verdict ${ok?'ok':'no'}">${ok?'✓ Correcto':'✗ Incorrecto · la respuesta es '+keys[q.c]+')'}</div>${q.e}`;}else{explain.className="explain";explain.innerHTML="";}
  $("prev").disabled=cur===0;$("next").textContent=cur===Q.length-1?"Ver resultados":"Siguiente →";updateStats();refreshGrid();}
function choose(i){if(answers[cur]!=null)return;answers[cur]=i;render();}
$("next").onclick=()=>{if(cur===Q.length-1)showResults();else{cur++;render();window.scrollTo({top:0,behavior:"smooth"});}};
$("prev").onclick=()=>{if(cur>0){cur--;render();window.scrollTo({top:0,behavior:"smooth"});}};
function showResults(){const ok=answers.filter((a,i)=>a===Q[i].c).length;const pct=Math.round(ok/Q.length*100);$("rOk").textContent=ok;let grade,msg;
  if(pct>=90){grade="Sobresaliente · ¡examen de 10!";msg="Dominas la neuroftalmología. A por el examen.";}
  else if(pct>=70){grade="Notable";msg="Buen nivel. Repasa los fallos en rojo, sobre todo las neuropatías ópticas y la localización por el campo.";}
  else if(pct>=50){grade="Aprobado justo";msg="Base correcta; refuerza neuritis vs NOIA y las pupilas.";}
  else{grade="A reforzar";msg="Vuelve sobre el resumen de T13-14 (OJO CUIDADO) y repite el test.";}
  $("rGrade").textContent=grade;$("rMsg").textContent=`${ok}/80 aciertos (${pct}%). ${msg}`;$("results").classList.add("show");$("results").scrollIntoView({behavior:"smooth"});}
$("restart").onclick=()=>{answers.fill(null);cur=0;$("results").classList.remove("show");render();window.scrollTo({top:0,behavior:"smooth"});};
buildGrid();render();
</script>
</body>
</html>
