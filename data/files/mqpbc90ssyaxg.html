<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test T22 · Párpados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#eaeef0;--paper:#fff;--ink:#13232a;--ink-soft:#46585f;--teal:#0f4d57;--teal-deep:#0a3037;--amber:#cf8327;--amber-soft:#f6ecdc;--good:#1f7a4d;--good-bg:#e3f3ea;--bad:#b23a32;--bad-bg:#fbe7e4;--line:#d9e0e3;--shadow:0 10px 30px -16px rgba(10,48,55,.35);}
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;padding:18px 14px 60px}
  .wrap{max-width:760px;margin:0 auto}
  header.top{background:linear-gradient(135deg,var(--teal),var(--teal-deep));color:#eaf3f3;border-radius:18px;padding:22px 22px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  header.top::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#1c6b76,#0a3037 70%);box-shadow:inset 0 0 0 14px rgba(207,131,39,.25);opacity:.55}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#8fc3c7;font-weight:600;margin:0 0 6px}
  header.top h1{font-family:'Spectral',serif;font-weight:700;font-size:23px;line-height:1.15;margin:0 0 4px;position:relative;z-index:1}
  header.top p.sub{margin:0;font-size:13px;color:#bcd7d9;position:relative;z-index:1}
  .stats{display:flex;gap:10px;margin-top:16px;position:relative;z-index:1;flex-wrap:wrap}
  .stat{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:8px 12px;flex:1;min-width:84px}
  .stat .n{font-size:19px;font-weight:700;font-family:'Spectral',serif}.stat .l{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:#9fc8cb}
  .stat.good .n{color:#9ff0c2}.stat.bad .n{color:#ffb3ab}
  .progress{height:7px;background:rgba(255,255,255,.16);border-radius:99px;margin-top:14px;overflow:hidden;position:relative;z-index:1}
  .progress>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--amber),#e8a850);border-radius:99px;transition:width .35s}
  .card{background:var(--paper);border-radius:18px;box-shadow:var(--shadow);padding:22px 22px 20px;margin-top:18px;border:1px solid var(--line)}
  .qmeta{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .qnum{font-family:'Spectral',serif;font-weight:700;font-size:14px;color:var(--teal);background:var(--amber-soft);border:1px solid #ecdcc3;border-radius:8px;padding:3px 10px}
  .tag{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:var(--ink-soft);background:#eef2f3;border-radius:7px;padding:3px 9px}
  .tag.case{color:#8a4b12;background:#f6ecdc}.tag.ddx{color:#7a3a8f;background:#f1e6f4}
  .stem{font-family:'Spectral',serif;font-size:18px;line-height:1.4;margin:0 0 16px;font-weight:600}
  .stem .case-lead{display:block;font-weight:400;font-style:italic;color:var(--ink-soft);font-size:15px;margin-bottom:8px}
  .figure{margin:0 0 16px;background:#f5f8f8;border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
  .figure svg{max-width:100%;height:auto}.figcap{font-size:11.5px;color:var(--ink-soft);margin-top:6px;font-style:italic}
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{display:flex;gap:11px;align-items:flex-start;width:100%;background:#fbfcfc;border:1.5px solid var(--line);border-radius:12px;padding:12px 13px;cursor:pointer;font:inherit;font-size:14.5px;color:var(--ink);transition:.15s;text-align:left}
  .opt:hover:not(.locked){border-color:var(--teal);background:#f3f8f8}
  .opt .key{flex:none;width:24px;height:24px;border-radius:7px;background:#eef2f3;color:var(--ink-soft);font-weight:700;font-size:13px;display:grid;place-items:center;font-family:'Spectral',serif}
  .opt .txt{padding-top:1px}.opt.locked{cursor:default}
  .opt.correct{border-color:var(--good);background:var(--good-bg)}.opt.correct .key{background:var(--good);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--bad-bg)}.opt.wrong .key{background:var(--bad);color:#fff}
  .opt.dim{opacity:.6}
  .explain{margin-top:14px;border-left:4px solid var(--amber);background:var(--amber-soft);border-radius:0 12px 12px 0;padding:12px 14px;font-size:14px;display:none}
  .explain.show{display:block;animation:fade .3s}.explain b{color:var(--teal-deep)}
  .verdict{font-weight:700;font-family:'Spectral',serif;font-size:15px;margin-bottom:3px}.verdict.ok{color:var(--good)}.verdict.no{color:var(--bad)}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .nav{display:flex;gap:10px;margin-top:18px;align-items:center}
  .btn{font:inherit;font-weight:600;font-size:14px;border-radius:11px;padding:11px 18px;cursor:pointer;border:1.5px solid var(--teal);transition:.15s}
  .btn.ghost{background:#fff;color:var(--teal)}.btn.ghost:hover{background:#eef6f6}
  .btn.solid{background:var(--teal);color:#fff;margin-left:auto}.btn.solid:hover{background:var(--teal-deep)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .jumpwrap{margin-top:18px;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:16px 18px;box-shadow:var(--shadow)}
  .jumpwrap h3{margin:0 0 12px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
  .grid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
  .cell{aspect-ratio:1;border:1.5px solid var(--line);border-radius:8px;background:#fbfcfc;font:inherit;font-size:12px;font-weight:600;color:var(--ink-soft);cursor:pointer;display:grid;place-items:center;transition:.12s}
  .cell:hover{border-color:var(--teal)}.cell.cur{border-color:var(--teal);box-shadow:0 0 0 2px rgba(15,77,87,.2)}
  .cell.ok{background:var(--good-bg);border-color:var(--good);color:var(--good)}.cell.no{background:var(--bad-bg);border-color:var(--bad);color:var(--bad)}
  .results{display:none;background:var(--paper);border-radius:18px;box-shadow:var(--shadow);padding:28px 24px;margin-top:18px;text-align:center;border:1px solid var(--line)}
  .results.show{display:block}
  .scoreBig{font-family:'Spectral',serif;font-size:58px;font-weight:700;color:var(--teal);line-height:1}.scoreBig small{font-size:24px;color:var(--ink-soft)}
  .grade{font-family:'Spectral',serif;font-size:22px;font-weight:600;margin-top:8px}.results p{color:var(--ink-soft);font-size:14.5px}
  @media(max-width:520px){.grid{grid-template-columns:repeat(8,1fr)}.stem{font-size:16.5px}header.top h1{font-size:20px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <p class="eyebrow">Oftalmología · 4º Medicina · T22</p>
    <h1>Patología Palpebral</h1>
    <p class="sub">80 preguntas · ≥20 casos clínicos · diagnóstico diferencial · respuesta razonada</p>
    <div class="stats">
      <div class="stat"><div class="n" id="sPos">1<span style="font-size:13px;color:#9fc8cb">/80</span></div><div class="l">Pregunta</div></div>
      <div class="stat good"><div class="n" id="sOk">0</div><div class="l">Aciertos</div></div>
      <div class="stat bad"><div class="n" id="sNo">0</div><div class="l">Fallos</div></div>
    </div>
    <div class="progress"><i id="bar"></i></div>
  </header>
  <main class="card" id="card">
    <div class="qmeta"><span class="qnum" id="qnum">01</span><span class="tag" id="qtag">Tema</span></div>
    <div id="figure"></div>
    <p class="stem" id="stem"></p>
    <div class="opts" id="opts"></div>
    <div class="explain" id="explain"></div>
    <div class="nav">
      <button class="btn ghost" id="prev">← Anterior</button>
      <button class="btn solid" id="next">Siguiente →</button>
    </div>
  </main>
  <section class="results" id="results">
    <div class="scoreBig"><span id="rOk">0</span><small>/80</small></div>
    <div class="grade" id="rGrade"></div>
    <p id="rMsg"></p>
    <button class="btn solid" style="margin:14px auto 0" id="restart">Repetir test</button>
  </section>
  <section class="jumpwrap"><h3>Navegación rápida</h3><div class="grid" id="grid"></div></section>
</div>

<script>
const figOrzuelo=`<svg viewBox="0 0 240 130" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Orzuelo: nódulo rojo doloroso en el borde palpebral">
<path d="M30 70 Q120 44 210 70 Q120 96 30 70Z" fill="#fff" stroke="#7a8b90"/><circle cx="120" cy="70" r="22" fill="#9a6a3c"/><circle cx="120" cy="70" r="10" fill="#1a1a1a"/>
<circle cx="92" cy="50" r="11" fill="#d65a4a"/><circle cx="92" cy="50" r="11" fill="none" stroke="#a83228" stroke-width="2.5"/></svg>`;
const figChalazion=`<svg viewBox="0 0 240 130" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Chalazion: nódulo firme indoloro en el párpado">
<path d="M30 70 Q120 44 210 70 Q120 96 30 70Z" fill="#fff" stroke="#7a8b90"/><circle cx="120" cy="70" r="22" fill="#9a6a3c"/><circle cx="120" cy="70" r="10" fill="#1a1a1a"/>
<circle cx="150" cy="46" r="13" fill="#e0d3e6" stroke="#9a6aa8" stroke-width="2.5"/></svg>`;
const figEctEnt=`<svg viewBox="0 0 320 130" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ectropion y entropion del párpado inferior">
<text x="80" y="16" text-anchor="middle" style="font:600 10px Spectral,serif;fill:#1a5e86">Ectropion</text>
<path d="M20 55 Q80 38 140 55" fill="none" stroke="#7a8b90" stroke-width="2"/><path d="M20 70 Q80 96 140 70" fill="none" stroke="#d65a4a" stroke-width="3"/><circle cx="80" cy="60" r="15" fill="#9a6a3c"/><circle cx="80" cy="60" r="7" fill="#1a1a1a"/>
<text x="250" y="16" text-anchor="middle" style="font:600 10px Spectral,serif;fill:#9a4d12">Entropion</text>
<path d="M190 55 Q250 38 310 55" fill="none" stroke="#7a8b90" stroke-width="2"/><path d="M190 72 Q250 60 310 72" fill="none" stroke="#7a8b90" stroke-width="3"/><g stroke="#1a1a1a" stroke-width="1.5"><path d="M230 66 l-4 8"/><path d="M250 64 l-3 9"/><path d="M270 66 l-2 8"/></g><circle cx="250" cy="60" r="15" fill="#9a6a3c"/><circle cx="250" cy="60" r="7" fill="#1a1a1a"/></svg>`;
const figBaso=`<svg viewBox="0 0 240 130" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Carcinoma basocelular: nódulo ulcerado con telangiectasias en párpado inferior">
<path d="M30 55 Q120 34 210 55 Q120 74 30 55Z" fill="#fff" stroke="#7a8b90"/><circle cx="120" cy="55" r="18" fill="#9a6a3c"/><circle cx="120" cy="55" r="8" fill="#1a1a1a"/>
<circle cx="120" cy="92" r="18" fill="#e8d9d2" stroke="#b89a8a" stroke-width="2"/><circle cx="120" cy="92" r="6" fill="#cdb3a6"/>
<g stroke="#b23a32" stroke-width="1" fill="none"><path d="M108 86 q6 4 12 2"/><path d="M126 98 q5 -3 8 1"/></g>
<text x="120" y="124" text-anchor="middle" style="font:400 9px Inter;fill:#7a2a25">nódulo ulcerado + telangiectasias (párpado inferior)</text></svg>`;

const Q=[
{cat:"Blefaritis",c:1,q:"La patología palpebral inflamatoria MÁS FRECUENTE es:",
 o:["El chalazion","La blefaritis","El ectropion","El carcinoma basocelular"],
 e:"La <b>blefaritis</b> es la patología palpebral inflamatoria más frecuente (disfunción de Meibomio + flora bacteriana)."},
{cat:"Blefaritis",c:2,q:"La blefaritis se relaciona con la disfunción de:",
 o:["La glándula lagrimal","El músculo elevador","Las glándulas de Meibomio","El tarso"],
 e:"La <b>blefaritis</b> implica disfunción de las <b>glándulas de Meibomio</b> y alteración de la flora (colonización bacteriana)."},
{cat:"Blefaritis",c:3,q:"¿Cuál de estas es una complicación de la blefaritis?",
 o:["Catarata","Glaucoma","Desprendimiento de retina","Ojo seco evaporativo, orzuelo, chalazion, queratitis y triquiasis"],
 e:"La <b>blefaritis</b> puede complicarse con <b>ojo seco evaporativo, conjuntivitis irritativa, queratitis, triquiasis, orzuelo y chalazion</b>."},
{cat:"Orzuelo · DDx",c:0,ddx:true,q:"El orzuelo se diferencia del chalazion en que el orzuelo:",
 o:["Es una infección aguda DOLOROSA de una glándula sebácea","Es un quiste indoloro","Es un tumor maligno","Es una malposición"],
 e:"El <b>orzuelo</b> es una <b>infección aguda dolorosa</b> de una glándula sebácea (Meibomio/Zeiss); el chalazion es un quiste granulomatoso indoloro."},
{cat:"Imagen · orzuelo",c:1,figSrc:"figOrzuelo",figcap:"Párpado del paciente.",
 q:"Este nódulo rojo y doloroso en el borde palpebral corresponde a:",
 o:["Chalazion","Orzuelo","Carcinoma basocelular","Xantelasma"],
 e:"Nódulo agudo, rojo y <b>doloroso</b> = <b>orzuelo</b>."},
{cat:"Chalazion",c:2,q:"El chalazion es:",
 o:["Una infección aguda dolorosa","Un tumor maligno","Un quiste sebáceo de una glándula de Meibomio con reacción granulomatosa (indoloro)","Una malposición palpebral"],
 e:"El <b>chalazion</b> es un <b>quiste granulomatoso</b> de una glándula de Meibomio, <b>indoloro</b> y sin edema."},
{cat:"Imagen · chalazion",c:3,figSrc:"figChalazion",figcap:"Párpado del paciente.",
 q:"Este nódulo firme, no doloroso y sin eritema agudo corresponde a:",
 o:["Orzuelo","Dacriocistitis","Ectropion","Chalazion"],
 e:"Nódulo firme <b>indoloro</b> sin signos inflamatorios agudos = <b>chalazion</b>."},
{cat:"Chalazion · tto",c:0,q:"El tratamiento del chalazion incluye:",
 o:["Observación, corticoide depot intralesional o cirugía","Antibiótico oral siempre","Enucleación","Radioterapia"],
 e:"El <b>chalazion</b> se trata con <b>observación, corticoide depot intralesional o cirugía</b>."},
{cat:"Orzuelo · tto",c:1,q:"El tratamiento del orzuelo incluye:",
 o:["Solo observación","Calor local, pomada antibiótica (eritromicina) y drenaje si fluctúa","Quimioterapia","Cirugía de Mohs"],
 e:"El <b>orzuelo</b> se trata con <b>calor local, pomada antibiótica</b> (± corticoide), drenaje si fluctúa y valorar antibiótico oral."},
{cat:"Tumores · alarma",c:2,q:"Un chalazion recidivante en el mismo punto obliga a descartar:",
 o:["Orzuelo","Blefaritis","Carcinoma de células sebáceas","Ectropion"],
 e:"Un <b>chalazion recidivante</b> en el mismo sitio debe hacer descartar un <b>carcinoma de células sebáceas</b> (el gran simulador)."},
{cat:"Malposiciones",c:3,q:"El ectropion es:",
 o:["La caída del párpado","Una inversión del borde","Un quiste","La eversión del borde palpebral (hacia fuera)"],
 e:"El <b>ectropion</b> es la <b>eversión</b> del borde palpebral (hacia fuera)."},
{cat:"Malposiciones",c:0,q:"El entropion es:",
 o:["La inversión del borde palpebral (hacia dentro)","La eversión del borde","La caída del párpado","Un tumor"],
 e:"El <b>entropion</b> es la <b>inversión</b> del borde palpebral (hacia dentro), lo que hace que las pestañas rocen la córnea."},
{cat:"Imagen · malposición",c:1,figSrc:"figEctEnt",figcap:"Párpados inferiores.",
 q:"En la imagen, el ojo izquierdo muestra el borde evertido y el derecho invertido con pestañas hacia la córnea. ¿Cómo se llaman?",
 o:["Ptosis y triquiasis","Ectropion y entropion","Chalazion y orzuelo","Epicanto y telecanto"],
 e:"Borde evertido = <b>ectropion</b>; borde invertido con pestañas hacia la córnea = <b>entropion</b>."},
{cat:"Malposiciones · DDx",c:2,ddx:true,q:"La clínica característica del ectropion es:",
 o:["Sensación de cuerpo extraño por las pestañas","Visión doble","Queratinización y queratitis por EXPOSICIÓN","Ptosis"],
 e:"El <b>ectropion</b> (eversión) da <b>queratinización y queratitis por exposición</b>, ojo rojo y epífora."},
{cat:"Malposiciones · DDx",c:3,ddx:true,q:"La clínica característica del entropion es:",
 o:["Exposición corneal","Ptosis","Exoftalmos","Sensación de cuerpo extraño y queratitis TRAUMÁTICA (pestañas rozan)"],
 e:"El <b>entropion</b> (inversión) produce <b>sensación de cuerpo extraño y queratitis traumática</b> porque las pestañas rozan la córnea."},
{cat:"Malposiciones",c:0,q:"El ectropion paralítico se asocia a la parálisis del:",
 o:["VII par (facial), con lagoftalmos","III par","VI par","IV par"],
 e:"El <b>ectropion paralítico</b> se asocia a la parálisis del <b>VII par (facial)</b>, con lagoftalmos (no cierra el ojo)."},
{cat:"Caso clínico · entropion",c:1,case:true,
 lead:"Anciano con ojo rojo, lagrimeo y sensación de cuerpo extraño; al explorarlo se ve que el borde del párpado inferior está girado hacia dentro y las pestañas rozan la córnea.",
 q:"El diagnóstico es:",
 o:["Ectropion","Entropion","Ptosis","Chalazion"],
 e:"Borde invertido con pestañas rozando la córnea = <b>entropion</b> (involutivo en el anciano)."},
{cat:"Ptosis",c:2,q:"La ptosis se define como:",
 o:["La eversión del párpado","Una infección","La posición anormalmente baja del párpado superior","Un tumor"],
 e:"La <b>ptosis</b> es la <b>posición anormalmente baja del párpado superior</b>."},
{cat:"Ptosis · DDx",c:3,ddx:true,q:"Una ptosis con miosis (pupila pequeña) sugiere:",
 o:["Parálisis del III par","Marcus Gunn","Ptosis aponeurótica","Síndrome de Horner"],
 e:"Ptosis + <b>miosis</b> = <b>síndrome de Horner</b> (lesión simpática)."},
{cat:"Ptosis · DDx",c:0,ddx:true,q:"Una ptosis con midriasis y ojo 'abajo y afuera' sugiere:",
 o:["Parálisis del III par","Síndrome de Horner","Ptosis involutiva","Blefarofimosis"],
 e:"Ptosis + <b>midriasis</b> + ojo abajo/afuera = <b>parálisis del III par</b>."},
{cat:"Ptosis",c:1,q:"El síndrome de Marcus Gunn se caracteriza por:",
 o:["Ptosis con miosis","Ptosis que varía con el movimiento de la mandíbula (sincinesia)","Eversión del párpado","Un tumor"],
 e:"El <b>síndrome de Marcus Gunn</b> es una ptosis con <b>sincinesia mandibular</b> (el párpado se eleva al mover la mandíbula)."},
{cat:"Ptosis",c:2,q:"La ptosis más frecuente en el adulto mayor es la:",
 o:["Miogénica congénita","Neurogénica","Aponeurótica involutiva","Mecánica"],
 e:"La <b>ptosis aponeurótica involutiva</b> (desinserción de la aponeurosis del elevador) es la más frecuente en el adulto mayor."},
{cat:"Ptosis",c:3,q:"En la exploración de la ptosis es clave medir:",
 o:["La PIO","El campo visual","La refracción","La función del elevador (y la hendidura/pliegue palpebral)"],
 e:"En la <b>ptosis</b> se mide la hendidura palpebral, la altura del pliegue y, sobre todo, la <b>función del elevador</b>."},
{cat:"Pestañas",c:0,q:"La triquiasis es:",
 o:["Pestañas de origen normal que se dirigen hacia la conjuntiva/córnea","Una nueva fila de pestañas","Una ptosis","Un tumor"],
 e:"La <b>triquiasis</b> son pestañas de <b>origen normal</b> mal dirigidas hacia la conjuntiva y la córnea (adquirida)."},
{cat:"Pestañas · DDx",c:1,ddx:true,q:"La distiquiasis es:",
 o:["Pestañas normales mal dirigidas","Una NUEVA fila de pestañas que sale de las glándulas de Meibomio (metaplasia)","Una ptosis","Un orzuelo"],
 e:"La <b>distiquiasis</b> es una <b>fila extra</b> de pestañas que emerge de las glándulas de Meibomio (metaplasia pilosebácea)."},
{cat:"Pestañas · tto",c:2,q:"El tratamiento de una triquiasis localizada es:",
 o:["Observación","Antibióticos","Electrólisis o láser del folículo","Quimioterapia"],
 e:"La <b>triquiasis localizada</b> se trata con <b>electrólisis o láser</b> del folículo; la difusa/recidivante, con extirpación o plastia."},
{cat:"Congénitas",c:3,q:"El epicanto:",
 o:["Es un tumor","Es una ptosis","Produce queratitis","Es un pliegue del canto interno que puede simular estrabismo y mejora con el crecimiento"],
 e:"El <b>epicanto</b> es un pliegue del canto interno que <b>simula estrabismo</b> (pseudoestrabismo) y mejora con el crecimiento."},
{cat:"Congénitas",c:0,q:"El síndrome de blefarofimosis incluye:",
 o:["Epicanto inverso, telecanto y ptosis","Ectropion y entropion","Orzuelo y chalazion","Triquiasis y distiquiasis"],
 e:"El <b>síndrome de blefarofimosis</b> asocia <b>epicanto inverso, telecanto y ptosis</b>."},
{cat:"Congénitas",c:1,q:"El epibléfaron es un pliegue del párpado inferior que puede producir:",
 o:["Ectropion","Entropion","Ptosis","Exoftalmos"],

const figMap={figOrzuelo,figChalazion,figEctEnt,figBaso};
const answers=new Array(Q.length).fill(null);let cur=0;
const $=id=>document.getElementById(id);
const stem=$("stem"),opts=$("opts"),explain=$("explain"),figure=$("figure"),qnum=$("qnum"),qtag=$("qtag"),bar=$("bar"),grid=$("grid");
function buildGrid(){grid.innerHTML="";Q.forEach((_,i)=>{const b=document.createElement("button");b.className="cell";b.textContent=i+1;b.onclick=()=>{cur=i;render();window.scrollTo({top:0,behavior:"smooth"});};grid.appendChild(b);});}
function refreshGrid(){[...grid.children].forEach((c,i)=>{c.classList.remove("cur","ok","no");if(i===cur)c.classList.add("cur");if(answers[i]!=null)c.classList.add(answers[i]===Q[i].c?"ok":"no");});}
function updateStats(){const ok=answers.filter((a,i)=>a===Q[i].c).length;const no=answers.filter((a,i)=>a!=null&&a!==Q[i].c).length;$("sOk").textContent=ok;$("sNo").textContent=no;$("sPos").innerHTML=(cur+1)+'<span style="font-size:13px;color:#9fc8cb">/80</span>';const done=answers.filter(a=>a!=null).length;bar.style.width=(done/Q.length*100)+"%";}
function render(){const q=Q[cur];qnum.textContent=String(cur+1).padStart(2,"0");qtag.textContent=q.cat;qtag.className="tag"+(q.case?" case":(q.ddx?" ddx":""));
  if(q.figSrc&&figMap[q.figSrc]){figure.innerHTML=`<div class="figure">${figMap[q.figSrc]}<div class="figcap">${q.figcap||""}</div></div>`;}else figure.innerHTML="";
  stem.innerHTML=(q.lead?`<span class="case-lead">${q.lead}</span>`:"")+q.q;
  const keys=["a","b","c","d"];opts.innerHTML="";const chosen=answers[cur];
  q.o.forEach((txt,i)=>{const b=document.createElement("button");b.className="opt";b.innerHTML=`<span class="key">${keys[i]}</span><span class="txt">${txt}</span>`;
    if(chosen!=null){b.classList.add("locked");if(i===q.c)b.classList.add("correct");else if(i===chosen)b.classList.add("wrong");else b.classList.add("dim");}else b.onclick=()=>choose(i);opts.appendChild(b);});
  if(chosen!=null){const ok=chosen===q.c;explain.className="explain show";explain.innerHTML=`<div class="verdict ${ok?'ok':'no'}">${ok?'✓ Correcto':'✗ Incorrecto · la respuesta es '+keys[q.c]+')'}</div>${q.e}`;}else{explain.className="explain";explain.innerHTML="";}
  $("prev").disabled=cur===0;$("next").textContent=cur===Q.length-1?"Ver resultados":"Siguiente →";updateStats();refreshGrid();}
function choose(i){if(answers[cur]!=null)return;answers[cur]=i;render();}
$("next").onclick=()=>{if(cur===Q.length-1)showResults();else{cur++;render();window.scrollTo({top:0,behavior:"smooth"});}};
$("prev").onclick=()=>{if(cur>0){cur--;render();window.scrollTo({top:0,behavior:"smooth"});}};
function showResults(){const ok=answers.filter((a,i)=>a===Q[i].c).length;const pct=Math.round(ok/Q.length*100);$("rOk").textContent=ok;let grade,msg;
  if(pct>=90){grade="Sobresaliente · ¡examen de 10!";msg="Dominas la patología palpebral. A por el examen.";}
  else if(pct>=70){grade="Notable";msg="Buen nivel. Repasa los fallos en rojo, sobre todo los tumores y las malposiciones.";}
  else if(pct>=50){grade="Aprobado justo";msg="Base correcta; refuerza orzuelo vs chalazion y la ptosis.";}
  else{grade="A reforzar";msg="Vuelve sobre el resumen del T22 (OJO CUIDADO) y repite el test.";}
  $("rGrade").textContent=grade;$("rMsg").textContent=`${ok}/80 aciertos (${pct}%). ${msg}`;$("results").classList.add("show");$("results").scrollIntoView({behavior:"smooth"});}
$("restart").onclick=()=>{answers.fill(null);cur=0;$("results").classList.remove("show");render();window.scrollTo({top:0,behavior:"smooth"});};
buildGrid();render();
</script>
</body>
</html>
